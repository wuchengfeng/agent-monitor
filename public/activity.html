<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw Activity Timeline</title>
  <style>
    body { background: #0e1621; color: #cdd6e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { background: #17212b; padding: 10px 20px; border-bottom: 1px solid #0e1621; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    h1 { margin: 0; font-size: 16px; font-weight: 600; color: #fff; }
    .controls { display: flex; gap: 10px; align-items: center; }
    button { background: #2b5278; border: none; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    button:hover { background: #35638f; }
    button.active { background: #5288c1; }
    #timeline { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    
    .event-card { background: #17212b; border-radius: 6px; padding: 12px; border-left: 4px solid #2b5278; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    .event-card.role-user { border-left-color: #4caf50; }
    .event-card.role-assistant { border-left-color: #2b5278; }
    .event-card.role-tool { border-left-color: #e91e63; }
    .event-card.role-system { border-left-color: #9e9e9e; }
    
    .meta { display: flex; gap: 12px; font-size: 11px; color: #6c7883; margin-bottom: 8px; align-items: center; }
    .tag { background: #242f3d; padding: 2px 6px; border-radius: 4px; color: #7aa2d5; font-family: monospace; }
    .time { color: #828a95; }
    .btn-copy { background: transparent; border: 1px solid #242f3d; color: #cdd6e0; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .btn-copy:hover { background: #242f3d; }
    
    .content { font-size: 13px; line-height: 1.5; word-break: break-word; }
    .text-block { white-space: pre-wrap; margin-bottom: 8px; color: #dce3ea; }
    
    .tool-call { background: #0e1621; border: 1px solid #242f3d; border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .tool-header { background: #242f3d; padding: 4px 8px; font-size: 11px; color: #7aa2d5; font-weight: 600; display: flex; justify-content: space-between; }
    .tool-body { padding: 8px; font-family: monospace; font-size: 12px; color: #a8b3bf; overflow-x: auto; white-space: pre-wrap; }
    
    .tool-result { margin-top: 8px; border-top: 1px solid #242f3d; padding-top: 8px; }
    .result-label { font-size: 11px; color: #6c7883; margin-bottom: 4px; font-weight: 600; }
    
    .usage-stats { font-size: 10px; color: #536270; margin-top: 8px; text-align: right; }
    
    /* Syntax Highlighting (simple) */
    .key { color: #c586c0; }
    .string { color: #ce9178; }
    .number { color: #b5cea8; }
    .boolean { color: #569cd6; }

    /* Timing Panel */
    #timing-panel { display: none; flex: 1; overflow-y: auto; padding: 20px; }
    #timing-panel.active { display: block; }
    #timeline.hidden { display: none; }

    .timing-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }
    .summary-card { background: #17212b; border-radius: 6px; padding: 14px; }
    .summary-card .label { font-size: 11px; color: #6c7883; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-card .value { font-size: 22px; font-weight: 700; color: #fff; }
    .summary-card .sub { font-size: 11px; color: #828a95; margin-top: 4px; }
    .summary-card .ratio-bar { height: 6px; border-radius: 3px; background: #e88b4d; margin-top: 8px; overflow: hidden; display: flex; }
    .ratio-bar .llm-part { background: #5288c1; height: 100%; }
    .ratio-bar .tool-part { background: #e88b4d; height: 100%; }
    .ratio-bar .overhead-part { background: #444; height: 100%; }
    .highlight-warn { color: #e88b4d !important; }

    .timing-turn-card { background: #17212b; border-radius: 6px; padding: 12px; margin-bottom: 12px; max-width: 1200px; margin-left: auto; margin-right: auto; }
    .turn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; }
    .turn-label { color: #fff; font-weight: 600; }
    .turn-stats { color: #828a95; font-size: 11px; }
    .turn-stats span { margin-left: 10px; }
    .turn-stats .llm-color { color: #5288c1; }
    .turn-stats .tool-color { color: #e88b4d; }
    .turn-preview { font-size: 11px; color: #6c7883; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .waterfall { display: flex; height: 28px; border-radius: 4px; overflow: hidden; background: #0e1621; position: relative; }
    .wf-seg { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; min-width: 2px; overflow: hidden; white-space: nowrap; cursor: default; position: relative; box-sizing: border-box; }
    .wf-seg.llm { background: #2b5278; }
    .wf-seg.llm:nth-child(odd) { background: #35638f; }
    .wf-seg.tool { background: #e88b4d; }
    .wf-seg.tool.error { background: #e05252; }
    .wf-seg .seg-text { padding: 0 4px; overflow: hidden; text-overflow: ellipsis; }

    .wf-tooltip { position: fixed; background: #242f3d; border: 1px solid #35638f; border-radius: 4px; padding: 8px 10px; font-size: 11px; color: #cdd6e0; pointer-events: none; z-index: 999; white-space: pre-line; max-width: 320px; line-height: 1.5; }

    .legend { display: flex; gap: 16px; margin-bottom: 16px; max-width: 1200px; margin-left: auto; margin-right: auto; font-size: 11px; color: #828a95; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0e1621; }
    ::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #35638f; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">OpenClaw Timeline</h1>
    <div class="controls">
      <button onclick="location.href='/'">返回看板</button>
      <button id="btn-timing" onclick="toggleTimingView()">Timing 分析</button>
      <button onclick="clearTimeline()">清空</button>
    </div>
  </header>
  <div id="timing-panel"></div>
  <div id="timeline"></div>
  <div id="wf-tooltip" class="wf-tooltip" style="display:none"></div>

  <script>
    const timeline = document.getElementById('timeline');
    const processedIds = new Set();
    const eventById = new Map();
    const params = new URLSearchParams(location.search);
    const sid = params.get('sid');
    const agent = params.get('agent');
    const titleEl = document.getElementById('title');
    function displayAgentName(agentId){
      if (agentId === 'main') return '南波万';
      return agentId || 'unknown';
    }
    if (sid && agent) titleEl.textContent = `Agent ${displayAgentName(agent)} / Session ${sid}`;
    if (sid && !agent) titleEl.textContent = `Session Timeline: ${sid}`;
    if (!sid && agent) titleEl.textContent = `Agent Timeline: ${displayAgentName(agent)}`;
    
    function clearTimeline() {
      timeline.innerHTML = '';
      processedIds.clear();
    }
    
    function fmtTs(ts) {
      try {
        const d = new Date(typeof ts === 'number' ? ts : Date.parse(ts));
        const date = `${d.getMonth()+1}-${String(d.getDate()).padStart(2,'0')}`;
        const time = d.toLocaleTimeString() + '.' + String(d.getMilliseconds()).padStart(3, '0');
        return `${date} ${time}`;
      } catch { return String(ts); }
    }
    
    function syntaxHighlight(json) {
      if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
        var cls = 'number';
        if (/^"/.test(match)) {
          if (/:$/.test(match)) {
            cls = 'key';
          } else {
            cls = 'string';
          }
        } else if (/true|false/.test(match)) {
          cls = 'boolean';
        } else if (/null/.test(match)) {
          cls = 'null';
        }
        return '<span class="' + cls + '">' + match + '</span>';
      });
    }

    async function writeClipboard(text) {
      const payload = String(text == null ? '' : text);
      if (!payload.trim()) return false;
      try {
        await navigator.clipboard.writeText(payload);
        return true;
      } catch {
        try {
          const ta = document.createElement('textarea');
          ta.value = payload;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          ta.style.top = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          return !!ok;
        } catch {
          return false;
        }
      }
    }

    function extractTextFromEvent(e) {
      if (e && Array.isArray(e.fullContent)) {
        const parts = e.fullContent
          .filter((it) => it && it.type === 'text' && typeof it.text === 'string')
          .map((it) => it.text.trim())
          .filter(Boolean);
        if (parts.length) return parts.join('\n');
      }
      return String(e && (e.textPreview || '') || '').trim();
    }

    function buildEventCopyText(e) {
      const header = [
        e.agentId ? `agentId: ${displayAgentName(e.agentId)}` : '',
        e.sessionId ? `sessionId: ${e.sessionId}` : '',
        e.ts ? `ts: ${fmtTs(e.ts)}` : '',
        e.role ? `role: ${e.role}` : '',
        e.model ? `model: ${e.model}` : '',
        e.provider ? `provider: ${e.provider}` : '',
      ].filter(Boolean).join('\n');

      const text = extractTextFromEvent(e);
      const toolCalls = (e && Array.isArray(e.fullContent))
        ? e.fullContent.filter((it) => it && it.type === 'toolCall').map((it) => ({
            id: it.id,
            name: it.name,
            arguments: it.arguments,
          }))
        : [];

      const parts = [
        header,
        text ? `\n---\ntext:\n${text}` : '',
        toolCalls.length ? `\n---\ntoolCalls:\n${JSON.stringify(toolCalls, null, 2)}` : '',
        `\n---\nraw:\n${JSON.stringify(e, null, 2)}`,
      ].filter(Boolean);

      return parts.join('\n');
    }

    async function copyEvent(uid) {
      const e = eventById.get(uid);
      if (!e) return;
      const ok = await writeClipboard(buildEventCopyText(e));
      if (!ok) alert('复制失败：浏览器未授予剪贴板权限');
    }

    function renderEvent(e) {
      if (agent && e.agentId && e.agentId !== agent) return;
      if (sid && e.sessionId !== sid) return;
      // 唯一键去重: msgId 优先，没有则用 sessionId+ts
      const uid = e.msgId || ((e.agentId || 'main') + '-' + e.sessionId + '-' + e.ts);
      if (processedIds.has(uid)) return;
      processedIds.add(uid);
      eventById.set(uid, e);
      
      const div = document.createElement('div');
      
      // Determine role class
      let roleClass = 'role-system';
      if (e.role === 'user') roleClass = 'role-user';
      if (e.role === 'assistant') roleClass = 'role-assistant';
      if (e.role === 'tool' || e.role === 'toolResult') roleClass = 'role-tool'; // Assuming tool results map to tool role
      
      div.className = `event-card ${roleClass}`;
      
      // Meta Header
      let metaHtml = `
        <div class="meta">
          ${e.agentId ? `<span class="tag">${displayAgentName(e.agentId)}</span>` : ''}
          <span class="tag">${String(e.sessionId || 'unknown').substring(0, 8)}</span>
          <span class="time">${fmtTs(e.ts)}</span>
          <span class="tag">${e.role || 'unknown'}</span>
          ${e.model ? `<span class="tag" style="color:#ce9178">${e.model}</span>` : ''}
          ${e.provider ? `<span class="tag">${e.provider}</span>` : ''}
          <span style="flex:1"></span>
          <button class="btn-copy" onclick="copyEvent('${uid.replace(/'/g, "\\'")}')">复制</button>
        </div>
      `;
      
      // Content Body
      let contentHtml = '<div class="content">';
      
      // 1. Text Content
      if (e.fullContent && Array.isArray(e.fullContent)) {
        e.fullContent.forEach(item => {
          if (item.type === 'text') {
            contentHtml += `<div class="text-block">${item.text}</div>`;
          } else if (item.type === 'toolCall') {
            contentHtml += `
              <div class="tool-call">
                <div class="tool-header">
                  <span>🛠 ${item.name}</span>
                  <span>ID: ${item.id}</span>
                </div>
                <div class="tool-body">${syntaxHighlight(item.arguments)}</div>
              </div>
            `;
          }
        });
      } else if (e.textPreview) {
        // Fallback for older events or simple text
        contentHtml += `<div class="text-block">${e.textPreview}</div>`;
      }
      
      // 2. Tool Args (legacy or direct tool info)
      if (e.toolName && !e.fullContent) {
         contentHtml += `
            <div class="tool-call">
              <div class="tool-header">
                <span>🛠 ${e.toolName}</span>
              </div>
              <div class="tool-body">${e.toolArgs}</div>
            </div>
         `;
      }

      // 3. Tool Result (implicit in role usually, but let's check textPreview or fullContent)
      // If role is toolResult (usually user role in OpenAI API, but here we might distinguish)
      // Current parser sets role from m.role.
      
      contentHtml += '</div>'; // End content
      
      // Usage Stats
      if (e.usage) {
        contentHtml += `
          <div class="usage-stats">
            In: ${e.usage.input} | Out: ${e.usage.output} | Total: ${e.usage.totalTokens}
          </div>
        `;
      }
      
      div.innerHTML = metaHtml + contentHtml;
      
      // 最新消息插到最顶部
      timeline.prepend(div);
    }

    async function loadSnapshot() {
      try {
        if (sid) {
          const r = await fetch(`/session-history?agent=${encodeURIComponent(agent || 'main')}&sid=${encodeURIComponent(sid)}&limit=5000`, { cache: 'no-store' });
          const j = await r.json();
          if (j.items) j.items.forEach(renderEvent);
          return;
        }
        const r = await fetch('/snapshot?limit=200', { cache: 'no-store' });
        const j = await r.json();
        if (j.items) {
          const sorted = j.items.sort((a, b) => new Date(a.ts) - new Date(b.ts));
          sorted.forEach(renderEvent);
        }
      } catch (err) { console.error(err); }
    }

    // --- Timing Panel ---
    const timingPanel = document.getElementById('timing-panel');
    const timelineEl = document.getElementById('timeline');
    const btnTiming = document.getElementById('btn-timing');
    const tooltipEl = document.getElementById('wf-tooltip');
    let timingActive = false;

    function fmtDur(ms) {
      if (ms < 1000) return ms + 'ms';
      if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
      return (ms / 60000).toFixed(1) + 'min';
    }

    function pct(part, total) {
      if (!total) return '0';
      return (part / total * 100).toFixed(1);
    }

    function toggleTimingView() {
      timingActive = !timingActive;
      if (timingActive) {
        btnTiming.classList.add('active');
        timingPanel.classList.add('active');
        timelineEl.classList.add('hidden');
        loadTimingData();
      } else {
        btnTiming.classList.remove('active');
        timingPanel.classList.remove('active');
        timelineEl.classList.remove('hidden');
      }
    }

    async function loadTimingData() {
      timingPanel.innerHTML = '<div style="text-align:center;padding:40px;color:#6c7883">Loading timing data...</div>';
      try {
        const r = await fetch(`/api/session-timing?agent=${encodeURIComponent(agent || 'main')}&sid=${encodeURIComponent(sid)}`, { cache: 'no-store' });
        const data = await r.json();
        renderTimingPanel(data);
      } catch (err) {
        timingPanel.innerHTML = `<div style="text-align:center;padding:40px;color:#e05252">Load failed: ${err.message}</div>`;
      }
    }

    function renderTimingPanel(data) {
      const { turns, summary } = data;
      if (!turns || !turns.length) {
        timingPanel.innerHTML = '<div style="text-align:center;padding:40px;color:#6c7883">No timing data available</div>';
        return;
      }
      const s = summary;
      const llmPct = pct(s.totalLlmMs, s.totalMs);
      const toolPct = pct(s.totalToolMs, s.totalMs);

      let html = '';

      // Summary cards
      html += '<div class="timing-summary">';
      html += `<div class="summary-card">
        <div class="label">Total Duration</div>
        <div class="value">${fmtDur(s.totalMs)}</div>
        <div class="sub">${s.totalTurns} turns, ${s.llmCalls} LLM calls, ${s.toolCalls} tool calls</div>
        <div class="ratio-bar"><div class="llm-part" style="width:${llmPct}%"></div><div class="tool-part" style="width:${toolPct}%"></div></div>
        <div class="sub">LLM ${llmPct}% / Tool ${toolPct}%</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Avg LLM Latency</div>
        <div class="value ${s.avgLlmMs > 30000 ? 'highlight-warn' : ''}">${fmtDur(s.avgLlmMs)}</div>
        <div class="sub">${s.llmCalls} calls total</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Slowest LLM Call</div>
        <div class="value highlight-warn">${s.longestLlm ? fmtDur(s.longestLlm.durationMs) : '-'}</div>
        <div class="sub">${s.longestLlm ? `Turn ${s.longestLlm.turnIndex} · ${s.longestLlm.model || ''}` : ''}</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Slowest Tool</div>
        <div class="value">${s.longestTool ? fmtDur(s.longestTool.durationMs) : '-'}</div>
        <div class="sub">${s.longestTool ? `Turn ${s.longestTool.turnIndex} · ${s.longestTool.name || ''}` : ''}</div>
      </div>`;
      html += '</div>';

      // Legend
      html += `<div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#2b5278"></div> LLM Thinking</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#e88b4d"></div> Tool Execution</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#e05252"></div> Tool Error</div>
      </div>`;

      // Find max turn duration for proportional widths
      const maxTurnMs = Math.max(...turns.map(t => t.totalMs), 1);

      // Waterfall turns (newest first)
      for (let i = turns.length - 1; i >= 0; i--) {
        const turn = turns[i];
        const barWidthPct = Math.max(5, turn.totalMs / maxTurnMs * 100);
        html += `<div class="timing-turn-card">`;
        html += `<div class="turn-header">
          <span class="turn-label">Turn ${turn.turnIndex + 1}</span>
          <span class="turn-stats">
            ${fmtDur(turn.totalMs)} total
            <span class="llm-color">LLM ${fmtDur(turn.llmMs)}</span>
            <span class="tool-color">Tool ${fmtDur(turn.toolMs)}</span>
            <span>${turn.phases.length} phases</span>
          </span>
        </div>`;
        if (turn.userPreview) {
          html += `<div class="turn-preview">User: ${escHtml(turn.userPreview)}</div>`;
        }
        if (turn.assistantPreview) {
          html += `<div class="turn-preview">Bot: ${escHtml(turn.assistantPreview)}</div>`;
        }
        html += `<div class="waterfall" style="width:${barWidthPct.toFixed(1)}%">`;
        const turnTotal = Math.max(turn.totalMs, 1);
        for (const p of turn.phases) {
          const segPct = Math.max(0.3, p.durationMs / turnTotal * 100);
          const cls = p.type === 'llm' ? 'llm' : ('tool' + (p.isError ? ' error' : ''));
          const label = p.type === 'llm' ? fmtDur(p.durationMs) : `${p.name} ${fmtDur(p.durationMs)}`;
          const tipData = p.type === 'llm'
            ? `LLM: ${fmtDur(p.durationMs)}\nModel: ${p.model || '-'}\nProvider: ${p.provider || '-'}\nInput: ${p.inputTokens} / Output: ${p.outputTokens}\nStop: ${p.stopReason || '-'}`
            : `Tool: ${p.name}\nDuration: ${fmtDur(p.durationMs)}\nStatus: ${p.status || '-'}${p.isError ? '\n⚠ Error' : ''}`;
          html += `<div class="wf-seg ${cls}" style="width:${segPct.toFixed(2)}%" data-tip="${escAttr(tipData)}"><span class="seg-text">${label}</span></div>`;
        }
        html += '</div></div>';
      }

      timingPanel.innerHTML = html;

      // Tooltip handlers
      timingPanel.querySelectorAll('.wf-seg').forEach(el => {
        el.addEventListener('mouseenter', (ev) => {
          tooltipEl.textContent = el.dataset.tip;
          tooltipEl.style.display = 'block';
          positionTooltip(ev);
        });
        el.addEventListener('mousemove', positionTooltip);
        el.addEventListener('mouseleave', () => { tooltipEl.style.display = 'none'; });
      });
    }

    function positionTooltip(ev) {
      tooltipEl.style.left = (ev.clientX + 12) + 'px';
      tooltipEl.style.top = (ev.clientY + 12) + 'px';
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Init
    loadSnapshot();

    // SSE
    const es = new EventSource('/events');
    es.onmessage = (ev) => {
      try {
        const e = JSON.parse(ev.data);
        renderEvent(e);
      } catch (err) { console.error(err); }
    };
  </script>
</body>
</html>
