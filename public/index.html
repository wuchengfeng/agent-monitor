<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Monitor</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:#0b0f14;color:#e6eef8;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    header{padding:12px 16px;background:#0e1621;border-bottom:1px solid #1c2834;position:sticky;top:0;flex:0 0 auto}
    h1{font-size:18px;margin:0}
    #grid{display:flex;flex-direction:column;gap:12px;padding:12px;flex:1;min-height:0;overflow:auto;align-content:stretch;justify-content:stretch}
    .agent-block{border:1px solid #1c2834;border-radius:10px;background:#0e1621;padding:10px;display:flex;flex-direction:column;gap:10px}
    .agent-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .agent-grid{display:grid;gap:12px}
    .card{background:#111a24;border:1px solid #1c2834;border-radius:8px;padding:12px;min-height:0;height:100%;display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease}
    .card.primary{border-color:#2e7d32;box-shadow:0 0 0 1px rgba(46,125,50,.35),0 10px 28px rgba(46,125,50,.18)}
    .card.highlight{border-color:#3a78ff;box-shadow:0 0 0 1px rgba(58,120,255,.45),0 10px 28px rgba(58,120,255,.18);animation:bump .45s ease}
    @keyframes bump{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-4px) scale(1.02)}100%{transform:translateY(0) scale(1)}}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .badge{font-size:12px;padding:2px 6px;border-radius:6px;border:1px solid #2a3e52;color:#d6e7ff}
    .title{font-weight:600;color:#cfe3ff}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;color:#a8b3bf;word-break:break-all}
    .ts{color:#7aa2d5;font-size:12px}
    .card-body{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,2fr);gap:10px;margin-top:10px}
    .card.fullscreen .card-body{grid-template-columns:minmax(0,1fr) minmax(0,2fr)}
    .pane{border:1px solid #1c2834;border-radius:8px;background:#0e1621;min-height:0;display:flex;flex-direction:column;overflow:hidden}
    .pane-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #1c2834;background:#0b0f14}
    .pane-title{font-size:13px;font-weight:700;color:#e8f2ff;letter-spacing:.2px}
    .pane-sub{font-size:11px;color:#7aa2d5}
    .pane-main{flex:1;min-height:0;display:flex;flex-direction:column}
    .pane-list{flex:1;min-height:0;overflow:auto}
    .pane-detail{flex:0 0 auto;max-height:48%;overflow:auto;border-top:1px solid #1c2834;padding:10px}
    .card.fullscreen .pane-detail{max-height:55%}
    .list-row{display:grid;grid-template-columns:52px max-content 92px 1fr;gap:8px;padding:7px 10px;border-bottom:1px dashed #243444;align-items:center;font-size:12px}
    .list-row:hover{background:#0b0f14}
    .list-row.selected{background:rgba(58,120,255,.12);border-bottom-color:rgba(58,120,255,.35)}
    .cell-time{color:#5c6b7f;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .cell-type{color:#a8b3bf;font-weight:700;display:flex;gap:6px;align-items:center;overflow:visible;min-width:0}
    .cell-tokens{color:#4caf50;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .cell-snippet{color:#7aa2d5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .detail-title{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .detail-block{margin-top:10px;white-space:pre-wrap;word-break:break-word;line-height:1.45;font-size:12px;color:#e6eef8}
    .detail-meta{margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:#a8b3bf}
    .detail-box{margin-top:10px;border:1px solid #2a3e52;border-radius:6px;background:#0b0f14;padding:8px;white-space:pre-wrap;word-break:break-word;font-size:13px;color:#d0dae5}
    .health{margin-top:6px}
    .health-head{display:flex;gap:8px;align-items:center;font-size:12px;color:#a8b3bf}
    .health-bar{position:relative;margin-top:6px;height:10px;border-radius:6px;border:1px solid #2a3e52;background:#13202e;overflow:visible}
    .health-fill{position:relative;height:100%;border-radius:6px}
    .mini-timing{margin-top:6px}
    .mini-timing-head{display:flex;gap:8px;align-items:center;font-size:11px;color:#a8b3bf}
    .mini-timing-head .llm-c{color:#5288c1}
    .mini-timing-head .tool-c{color:#e88b4d}
    .mini-timing-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:#13202e;margin-top:4px;border:1px solid #2a3e52}
    .mini-timing-bar .mt-llm{background:#2b5278;height:100%}
    .mini-timing-bar .mt-tool{background:#e88b4d;height:100%}
    .logs-container {margin-top:8px;height:220px;overflow-y:auto;border-top:1px solid #1c2834;padding-top:4px;background:#0e1621;border-radius:4px;padding:6px}
    .logs-container::-webkit-scrollbar {width:6px}
    .logs-container::-webkit-scrollbar-track {background:#111a24}
    .logs-container::-webkit-scrollbar-thumb {background:#243444;border-radius:3px}
    .btn-archive{margin-left:auto;cursor:pointer;opacity:0.6;font-size:12px;padding:2px 8px;border:1px solid #243444;border-radius:4px;color:#a9c7e7;background:transparent}
    .btn-archive:hover{opacity:1;background:#1c2834}
    .btn-danger{cursor:pointer;opacity:0.7;font-size:12px;padding:2px 8px;border:1px solid #5c2a2a;border-radius:4px;color:#ffb4b4;background:transparent}
    .btn-danger:hover{opacity:1;background:#2a1717}
    .btn-link{cursor:pointer;opacity:0.9;font-size:12px;padding:2px 8px;border:1px solid #243444;border-radius:4px;color:#7aa2d5;background:transparent}
    .btn-link:hover{background:#1c2834}
    .btn-copy{cursor:pointer;opacity:0.95;font-size:12px;padding:2px 8px;border:1px solid #2a3e52;border-radius:4px;color:#cfe3ff;background:transparent}
    .btn-copy:hover{background:#13202e}
    .header-row{display:flex;align-items:center;justify-content:space-between}
    .toggle-archived{cursor:pointer;font-size:12px;color:#7aa2d5;border:1px solid #243444;padding:4px 8px;border-radius:4px;background:#0e1621}
    .toggle-archived:hover{background:#1c2834}
    .stats-table {width:100%;font-size:11px;border-collapse:collapse;margin-top:8px;color:#a8b3bf}
    .stats-table th, .stats-table td {text-align:left;padding:2px 4px;border-bottom:1px solid #1c2834}
    .stats-table th {color:#7aa2d5}
    .toggle-details {cursor:pointer;color:#3a78ff;font-size:12px;margin-top:6px;display:inline-block}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;padding:48px 16px;z-index:1000}
    .panel{width:min(900px, 100%);background:#0e1621;border:1px solid #243444;border-radius:10px;box-shadow:0 14px 50px rgba(0,0,0,.5);overflow:hidden}
    .panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #1c2834}
    .panel-body{padding:12px 14px;max-height:70vh;overflow:auto}
    .panel-row{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1c2834}
    .tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;line-height:1;padding:2px 8px;border-radius:999px;border:1px solid #243444;background:#0b0f14;color:#e8f2ff;white-space:nowrap}
    .tag-openai{border-color:#234a86;background:rgba(58,120,255,.15);color:#a9c7ff}
    .tag-anthropic{border-color:#7a4a16;background:rgba(255,167,38,.14);color:#ffcc80}
    .tag-google{border-color:#1b6b4e;background:rgba(76,175,80,.12);color:#a5d6a7}
    .tag-qwen{border-color:#5e2a86;background:rgba(156,39,176,.12);color:#e1bee7}
    .tag-deepseek{border-color:#4c4c4c;background:rgba(158,158,158,.12);color:#e0e0e0}
    .tag-other{border-color:#2c3c4d;background:rgba(122,162,213,.10);color:#cfe3ff}
    .agent-tag{display:inline-flex;align-items:center;font-size:11px;padding:1px 7px;border-radius:999px;white-space:nowrap;font-weight:600;letter-spacing:.2px}
    .agent-tag-main{border:1px solid #234a86;background:rgba(58,120,255,.15);color:#a9c7ff}
    .agent-tag-nanbosirui{border:1px solid #1b6b4e;background:rgba(76,175,80,.12);color:#a5d6a7}
    .agent-tag-nanbosuikesi{border:1px solid #5e2a86;background:rgba(156,39,176,.12);color:#e1bee7}
    .agent-tag-default{border:1px solid #3a3a3a;background:rgba(158,158,158,.12);color:#bbb}
    .ch-row{display:grid;grid-template-columns:24px minmax(0,2fr) auto minmax(0,1fr) minmax(0,3fr) auto auto;gap:10px;align-items:center;padding:9px 10px;border-bottom:1px solid #1c2834;font-size:12px;transition:background .15s}
    .ch-row:hover{background:#111a24}
    .ch-section-head{display:flex;align-items:center;gap:8px;padding:10px 10px 6px;cursor:pointer;user-select:none;color:#5c6b7f;font-size:12px;font-weight:600;letter-spacing:.3px}
    .ch-section-head:hover{color:#7aa2d5}

    /* LLM capture list */
    #llm-captures-list{display:flex;flex-direction:column;gap:4px;padding:8px 6px !important}
    #llm-captures-list .llm-cap-row{
      border:1px solid #2b3c4f !important;
      border-bottom:1px solid #2b3c4f !important;
      border-radius:10px;
      background:#101b27;
      transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease;
    }
    /* --- Topology View --- */
    #topo-wrapper{display:grid;grid-template-columns:1fr 380px;gap:0;height:100%;min-height:0}
    #topo-canvas-wrap{position:relative;overflow:hidden;background:#080c10;border:1px solid #1c2834;border-radius:10px}
    #topo-canvas{display:block}
    .topo-controls{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:2}
    .topo-controls button{width:30px;height:30px;border:1px solid #2a3e52;border-radius:6px;background:#0e1621;color:#e6eef8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .topo-controls button:hover{background:#1c2834}
    .topo-legend{position:absolute;bottom:10px;left:10px;background:rgba(14,22,33,.92);border:1px solid #1c2834;border-radius:8px;padding:8px 12px;font-size:11px;color:#a8b3bf;z-index:2;display:flex;flex-direction:column;gap:4px}
    .topo-legend-row{display:flex;align-items:center;gap:8px}
    .topo-legend-line{width:24px;height:2px;border-radius:1px}
    .topo-legend-circle{width:12px;height:12px;border-radius:50%}
    #topo-side{border:1px solid #1c2834;border-radius:10px;background:#0e1621;display:flex;flex-direction:column;overflow:hidden;min-height:0}
    .topo-tabs{display:flex;border-bottom:1px solid #1c2834;flex:0 0 auto}
    .topo-tab{flex:1;padding:10px 12px;text-align:center;font-size:13px;font-weight:600;color:#7aa2d5;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .topo-tab:hover{background:#0b0f14}
    .topo-tab.active{color:#cfe3ff;border-bottom-color:#3a78ff;background:#0b0f14}
    #topo-panel{flex:1;min-height:0;overflow:auto;padding:12px}
    .topo-section{margin-bottom:14px}
    .topo-section-title{font-size:11px;font-weight:700;color:#7aa2d5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .topo-kv{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:12px}
    .topo-kv-label{color:#7aa2d5}
    .topo-kv-value{color:#e6eef8;word-break:break-all}
    .topo-session-list{display:flex;flex-direction:column;gap:3px}
    .topo-session-row{padding:6px 8px;border:1px solid #1c2834;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .12s}
    .topo-session-row:hover{background:#0b0f14}
    .topo-session-row.active{border-color:#3a78ff;background:rgba(58,120,255,.1)}
    .topo-edge-list{display:flex;flex-direction:column;gap:4px}
    .topo-edge-row{padding:5px 8px;border:1px solid #1c2834;border-radius:6px;font-size:11px;color:#a8b3bf}
    .topo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    #llm-captures-list .llm-cap-row:hover{
      transform:translateX(4px);
      background:#152434 !important;
      border-color:#4b6f93 !important;
      box-shadow:0 8px 18px rgba(0,0,0,.32);
    }
    #llm-captures-list .llm-cap-row.selected{
      background:rgba(58,120,255,.26) !important;
      border-color:rgba(120,170,255,.85) !important;
      box-shadow:0 0 0 1px rgba(120,170,255,.45),0 10px 24px rgba(58,120,255,.26);
    }
  </style>
  <script>
    const state = new Map(); // agentId:sessionId -> { data..., lastTs, bumpTs, updatedAt, interactions: [] }
    // 归档 Set
    const archived = new Set(JSON.parse(localStorage.getItem('agent_monitor_archived') || '[]'));
    let showArchived = false;
    // 频道视图
    let channelViewActive = false;
    let channelData = []; // [{ agentId, sessionKey, sessionId, channel, chatType, senderId, senderLabel, accountId, updatedAt }]
    let channelNicknames = {}; // { "feishu:direct:ou_xxx": "峰哥", ... }
    let editingNicknameKey = null; // 当前正在编辑备注的 key
    const expandedSessions = new Set(); // 用于记录展开了详情的 sessionId
    const selectedStepIndexBySession = new Map();
    const selectedApiIndexBySession = new Map();
    let deletedPanelOpen = false;
    let deletedCache = [];
    let deletedCacheAt = 0;

    // --- LLM Capture state ---
    const llmCaptures = [];        // array of capture summaries from SSE/polling
    const llmCapturesFull = new Map(); // captureId -> full capture body (lazy loaded)
    let llmCapturesPanelOpen = false;
    let selectedCaptureId = null;
    let llmCaptureDetailExpanded = new Set(); // track which sections are expanded

    // --- Topology View state ---
    let topologyViewActive = false;
    let topologyData = null; // { agents, sessions, edges, version }
    let topoNodes = []; // computed layout nodes { id, type:'agent'|'session', x, y, r, color, label, data }
    let topoEdges = []; // computed layout edges { source, target, type, meta, color }
    let topoSelectedNode = null; // { type, id }
    let topoSidePanelTab = 'agent'; // 'agent' | 'session'
    let topoPan = { x: 0, y: 0 };
    let topoZoom = 1;
    let topoHoverNode = null;
    let topoDragging = null;
    let topoPanStart = null;
    let topoAnimFrame = null;
    let topoPollingInterval = null;
    let topoEdgeDebounce = null;

    function saveArchived() {
      localStorage.setItem('agent_monitor_archived', JSON.stringify([...archived]));
    }

    function toggleArchive(key) {
      if (archived.has(key)) {
        archived.delete(key);
      } else {
        archived.add(key);
      }
      saveArchived();
      render();
    }
    
    function toggleDetails(key) {
      if (expandedSessions.has(key)) {
        expandedSessions.delete(key);
      } else {
        expandedSessions.add(key);
      }
      render();
    }

    function toggleShowArchived() {
      showArchived = !showArchived;
      render();
    }

    // --- LLM Capture functions ---
    function handleLlmCaptureEvent(ev) {
      // Deduplicate by captureId
      if (llmCaptures.some(c => c._id === ev.captureId)) return;
      llmCaptures.unshift({
        _id: ev.captureId,
        capturedAt: ev.capturedAt,
        model: ev.model,
        messageCount: ev.messageCount,
        toolCount: ev.toolCount,
        durationMs: ev.durationMs,
        requestSize: ev.requestSize,
        responseSize: ev.responseSize,
      });
      if (llmCaptures.length > 200) llmCaptures.pop();
      if (llmCapturesPanelOpen) renderLlmCapturesPanel();
    }

    async function pollLlmCaptures() {
      try {
        const resp = await fetch('/api/llm-captures?limit=100');
        const list = await resp.json();
        for (const c of list) {
          if (!llmCaptures.some(x => x._id === c._id)) {
            llmCaptures.push(c);
          }
        }
        llmCaptures.sort((a, b) => (b._id || 0) - (a._id || 0));
      } catch {}
    }

    async function fetchCaptureDetail(id) {
      if (llmCapturesFull.has(id)) return llmCapturesFull.get(id);
      try {
        const resp = await fetch(`/api/llm-capture/${id}`);
        const data = await resp.json();
        llmCapturesFull.set(id, data);
        // Evict old entries if cache grows too large
        if (llmCapturesFull.size > 50) {
          const first = llmCapturesFull.keys().next().value;
          llmCapturesFull.delete(first);
        }
        return data;
      } catch { return null; }
    }

    function toggleLlmCapturesPanel() {
      llmCapturesPanelOpen = !llmCapturesPanelOpen;
      document.getElementById('llm-captures-overlay').style.display = llmCapturesPanelOpen ? 'flex' : 'none';
      if (llmCapturesPanelOpen) {
        pollLlmCaptures().then(() => renderLlmCapturesPanel());
      }
    }

    function selectCapture(id) {
      selectedCaptureId = id;
      llmCaptureDetailExpanded = new Set();
      fetchCaptureDetail(id).then(() => renderLlmCapturesPanel());
    }

    function toggleCaptureSection(section) {
      if (llmCaptureDetailExpanded.has(section)) {
        llmCaptureDetailExpanded.delete(section);
      } else {
        llmCaptureDetailExpanded.add(section);
      }
      renderLlmCapturesPanel();
    }

    function copyCaptureJson() {
      const data = llmCapturesFull.get(selectedCaptureId);
      if (data) {
        navigator.clipboard.writeText(JSON.stringify(data.request, null, 2)).catch(() => {});
      }
    }

    function renderLlmCapturesPanel() {
      const listEl = document.getElementById('llm-captures-list');
      const detailEl = document.getElementById('llm-captures-detail');
      if (!listEl) return;

      // Render list
      listEl.innerHTML = llmCaptures.length ? llmCaptures.map(c => {
        const sel = c._id === selectedCaptureId ? 'selected' : '';
        const t = fmtTimeHms(c.capturedAt);
        const sizeKB = Math.round((c.requestSize || 0) / 1024);
        const model = (c.model||'?').split('/').pop();
        const dur = c.durationMs ? (c.durationMs/1000).toFixed(1)+'s' : '';
        return `<div class="list-row llm-cap-row ${sel}" onclick="selectCapture(${c._id})" style="grid-template-columns:56px 1fr;gap:6px;align-items:center;padding:8px 10px">
          <div class="cell-time">${t}</div>
          <div style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:11px">
            <span class="tag tag-other" style="font-size:10px">${escHtml(model)}</span>
            <span class="mono" style="opacity:.7">${c.messageCount||0}m ${c.toolCount||0}t ${sizeKB}KB ${dur}</span>
          </div>
        </div>`;
      }).join('') : '<div class="mono" style="padding:10px">暂无 LLM 请求捕获。请确保 mitmproxy 已启动。</div>';

      // Render detail
      if (!detailEl) return;
      const capture = llmCapturesFull.get(selectedCaptureId);
      if (!capture) {
        detailEl.innerHTML = '<div class="mono" style="padding:10px">点击左侧列表查看详情</div>';
        return;
      }

      const req = capture.request || {};
      const messages = req.messages || [];
      const tools = req.tools || [];
      const resp = capture.response || {};

      // Params section (always visible)
      const params = ['model','temperature','max_tokens','max_completion_tokens','top_p','stream','stop','frequency_penalty','presence_penalty']
        .filter(k => req[k] !== undefined)
        .map(k => `<span class="badge">${k}: ${JSON.stringify(req[k])}</span>`)
        .join(' ');

      // System prompt
      const sysMessages = messages.filter(m => m.role === 'system' || m.role === 'developer');
      const sysExpanded = llmCaptureDetailExpanded.has('system');
      const sysContent = sysMessages.map(m => typeof m.content === 'string' ? m.content : JSON.stringify(m.content)).join('\n---\n');
      const sysSection = sysMessages.length ? `
        <div style="margin-top:10px">
          <div class="row" style="gap:8px;cursor:pointer" onclick="toggleCaptureSection('system')">
            <div class="badge" style="background:#2b1a00;border-color:#5c3a00;color:#ffcc80">System Prompt</div>
            <span class="mono">${sysContent.length.toLocaleString()} chars</span>
            <span class="mono">${sysExpanded ? '▼' : '▶'}</span>
          </div>
          ${sysExpanded ? `<div class="detail-box" style="max-height:400px;overflow:auto">${escHtml(sysContent)}</div>` : ''}
        </div>` : '';

      // Conversation messages (non-system)
      const convMessages = messages.filter(m => m.role !== 'system' && m.role !== 'developer');
      const msgsExpanded = llmCaptureDetailExpanded.has('messages');
      let msgsInner = '';
      if (msgsExpanded) {
        const roleColors = {user:'#234a86',assistant:'#1b6b4e',tool:'#5e2a86'};
        msgsInner = '<div style="margin-top:6px">' + convMessages.map(function(m, i) {
          var msgKey = 'msg_' + i;
          var msgExpanded = llmCaptureDetailExpanded.has(msgKey);
          var contentStr = typeof m.content === 'string' ? m.content : JSON.stringify(m.content, null, 2);
          var preview = contentStr.replace(/\s+/g, ' ').slice(0, 100);
          var rc = roleColors[m.role] || '#2c3c4d';
          var tcInfo = m.tool_calls ? ' [' + m.tool_calls.map(function(tc){ return tc.function && tc.function.name || tc.name || '?'; }).join(', ') + ']' : '';
          var detailBox = msgExpanded

    function fmtTs(ts){try{const d=new Date(typeof ts==='number'?ts:Date.parse(ts));const date=`${d.getMonth()+1}-${String(d.getDate()).padStart(2,'0')}`;return `${date} ${d.toLocaleTimeString()}`}catch{return String(ts)}}
    function fmtTimeHms(ts){
      try{
        const d=new Date(typeof ts==='number'?ts:Date.parse(ts));
        return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');
      }catch{return '--:--:--'}
    }
    function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function tryPrettyJson(s){
      if (s == null) return '';
      if (typeof s === 'object') return JSON.stringify(s, null, 2);
      const str = String(s);
      try{
        const v = JSON.parse(str);
        return JSON.stringify(v, null, 2);
      }catch{
        return str;
      }
    }

    function extractTextFromFullContent(fullContent){
      if (!fullContent || !Array.isArray(fullContent)) return '';
      return fullContent
        .filter(x => x && x.type === 'text' && typeof x.text === 'string')
        .map(x => x.text)
        .join('\n')
        .trim();
    }

    function extractToolCallsFromFullContent(fullContent){
      if (!fullContent || !Array.isArray(fullContent)) return [];
      return fullContent
        .filter(x => x && x.type === 'toolCall')
        .map(x => ({
          id: x.id,
          name: x.name,
          arguments: x.arguments
        }));
    }

    function buildAssistantOutputText(fullContent, textPreview){
      const text = extractTextFromFullContent(fullContent) || String(textPreview || '').trim();
      const toolCalls = extractToolCallsFromFullContent(fullContent);
      if (!toolCalls.length) return text;
      const toolBlock = JSON.stringify(toolCalls, null, 2);
      return [text, text ? '' : '', 'toolCalls:', toolBlock].filter(Boolean).join('\n');
    }

    async function writeClipboard(text) {
      const payload = String(text == null ? '' : text);
      if (!payload.trim()) return false;
      try {
        await navigator.clipboard.writeText(payload);
        return true;
      } catch {
        try {
          const ta = document.createElement('textarea');
          ta.value = payload;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          ta.style.top = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          return !!ok;
        } catch {
          return false;
        }
      }
    }

    function displayAgentName(agentId){
      return agentId || 'unknown';
    }

    function makeKey(agentId, sessionId){
      return `${agentId}:${sessionId}`;
    }

    function parseKey(key){
      const idx = key.indexOf(':');
      if (idx === -1) return { agentId: 'main', sessionId: key };
      return { agentId: key.slice(0, idx), sessionId: key.slice(idx + 1) };
    }

    function buildSessionCopyText(key, extra = {}) {
      const s = state.get(key) || {};
      const { agentId, sessionId } = parseKey(key);
      const interactions = Array.isArray(s.interactions) ? s.interactions : [];
      const last = interactions.slice(0, 20).map((it) => {
        const t = fmtTs(it.ts);
        const type = it.type || '-';
        const model = it.model ? ` ${it.model}` : '';
        const text = String(extractTextFromFullContent(it.fullContent) || it.textPreview || it.content || '').trim();
        return `- [${t}] ${type}${model}\n${text ? text : '-'}`;
      }).join('\n\n');

      const currentMsg = String((extractTextFromFullContent(s.fullContent) || s.textPreview || '')).trim();
      const toolArgs = s.toolArgs != null ? tryPrettyJson(s.toolArgs) : '';

      const header = [
        `agentId: ${displayAgentName(agentId)}`,
        `sessionId: ${sessionId}`,
        s.ts ? `ts: ${fmtTs(s.ts)}` : '',
        s.updatedAt ? `updatedAt: ${fmtTs(s.updatedAt)}` : '',
        s.role ? `role: ${s.role}` : '',
        s.provider ? `provider: ${s.provider}` : '',
        s.model ? `model: ${s.model}` : '',
        s.stopReason ? `stopReason: ${s.stopReason}` : '',
        s.toolName ? `toolName: ${s.toolName}` : '',
        s.errorMessage ? `error: ${s.errorMessage}` : '',
      ].filter(Boolean).join('\n');

      const parts = [
        header,
        toolArgs ? `\n---\ntoolArgs:\n${toolArgs}` : '',
        currentMsg ? `\n---\ncurrentMessage:\n${currentMsg}` : '',
        last ? `\n---\nrecentInteractions:\n${last}` : '',
        extra && extra.text ? `\n---\n${extra.title || 'extra'}:\n${extra.text}` : '',
      ].filter(Boolean);

      return parts.join('\n');
    }

    async function copySessionDetail(key) {
      const ok = await writeClipboard(buildSessionCopyText(key));
      if (!ok) alert('复制失败：浏览器未授予剪贴板权限');
    }

    async function copyStepDetail(key) {

      const currentStep = getCurrentStepLabel(s);
      const currentMsg = String((extractTextFromFullContent(s.fullContent) || s.textPreview || '')).trim();
      const extra = {

          `currentStep: ${currentStep}`,

        ].join('\n'),
      };

    async function copyApiDetail(key) {
      const s = state.get(key) || {};
      const all = Array.isArray(s.interactions) ? s.interactions : [];
      const apiOnly = all.filter(i => i && i.role === 'assistant' && i.model);
      const view = apiOnly.slice(0, 50);
      const sel = Math.min(Math.max(0, Number(selectedApiIndexBySession.get(sid) || 0)), Math.max(0, view.length - 1));
      const selected = view[sel] || null;
      if (!selected) {
        const ok = await writeClipboard(buildSessionCopyText(key, { title: 'api', text: 'no selected api call' }));
        if (!ok) alert('复制失败：浏览器未授予剪贴板权限');
        return;
      }

      const tokenIn = selected.usage?.input || 0;
      const tokenOut = selected.usage?.output || 0;
      const tokenCacheR2 = selected.usage?.cacheRead || 0;
      const tokenCacheW2 = selected.usage?.cacheWrite || 0;
      const tokenCtx2 = tokenIn + tokenCacheR2 + tokenCacheW2;
      const inText = findNearestUserInput(all, selected.ts) || '';
      const outText = String(buildAssistantOutputText(selected.fullContent, selected.textPreview)).trim();
      const payload = [
        selected.ts ? `ts: ${fmtTs(selected.ts)}` : '',
        selected.provider ? `provider: ${selected.provider}` : '',
        selected.model ? `model: ${selected.model}` : '',
        selected.stopReason ? `stopReason: ${selected.stopReason}` : '',
        selected.errorMessage ? `error: ${selected.errorMessage}` : '',
        `ctx: ${tokenCtx2.toLocaleString()} (in:${tokenIn.toLocaleString()} cR:${tokenCacheR2.toLocaleString()} cW:${tokenCacheW2.toLocaleString()}) → out: ${tokenOut.toLocaleString()}`,
        '',
        'input:',
        inText ? inText : '-',
        '',
        'output:',
        outText ? outText : '-',
        '',
        'raw:',
        tryPrettyJson(selected),
      ].filter(Boolean).join('\n');

      const ok = await writeClipboard(buildSessionCopyText(key, { title: 'api', text: payload }));
      if (!ok) alert('复制失败：浏览器未授予剪贴板权限');
    }

    function findNearestUserInput(interactions, botTs){
      const target = new Date(botTs || 0).getTime();
      if (!Number.isFinite(target) || !Array.isArray(interactions)) return '';
      for (const it of interactions) {
        const t = new Date(it.ts || 0).getTime();
        if (!Number.isFinite(t)) continue;
        if (t <= target && it.role === 'user') {
          const text = extractTextFromFullContent(it.fullContent) || it.textPreview || it.content || '';
          return String(text).trim();
        }
      }
      return '';
    }
    function fmtCompact(n){
      const x = Number(n);
      if (!Number.isFinite(x)) return '0';
      const ax = Math.abs(x);
      const sign = x < 0 ? '-' : '';
      if (ax >= 1e9) return sign + (ax / 1e9).toFixed(1).replace(/\.0$/,'') + 'B';
      if (ax >= 1e6) return sign + (ax / 1e6).toFixed(1).replace(/\.0$/,'') + 'M';
      if (ax >= 1e3) return sign + (ax / 1e3).toFixed(1).replace(/\.0$/,'') + 'K';
      return String(x);
    }
    function modelFamily(model){
      const m = String(model||'').toLowerCase();
      if (m.includes('claude') || m.includes('anthropic')) return 'anthropic';
      if (m.includes('gpt') || m.includes('openai')) return 'openai';
      if (m.includes('gemini') || m.includes('google')) return 'google';
      if (m.includes('qwen') || m.includes('aliyun') || m.includes('alibaba')) return 'qwen';
      if (m.includes('deepseek')) return 'deepseek';
      return 'other';
    }

    function getCurrentStepLabel(s){
      const interactions = Array.isArray(s?.interactions) ? s.interactions : [];
      const top = interactions[0];
      if (top) {
        if (top.type === 'ToolCall') return `工具调用: ${top.toolName || top.content || 'tool'}`;
        if (top.type === 'ToolResult') return `工具结果: ${top.resultToolName || top.resultToolId || 'tool'}`;
        if (top.type === 'User') return '用户输入';
        if (top.type === 'Bot') return top.stopReason ? `状态: ${top.stopReason}` : '模型回复';
      }
      if (s?.toolName) return `工具: ${s.toolName}`;
      if (s?.stopReason) return `状态: ${s.stopReason}`;
      return '消息更新';
    }

    function computeGridLayout(n, width){
      const w = width || window.innerWidth || 1200;
      let cols = Math.floor(w / 420);
      cols = Math.max(1, Math.min(n || 1, cols || 1));
      return { cols };
    }

    function applyGridLayoutTo(grid, n){
      const { cols } = computeGridLayout(n, grid ? grid.clientWidth : undefined);
      if (grid) grid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
    }

    async function saveAutoDeleteSettings() {

        const enabled = !!document.getElementById('auto-delete-enabled')?.checked;

        const intervalMs = Math.round(intervalMin * 60 * 1000);
        const r = await fetch('/api/monitor/auto-soft-delete', {

          headers: { 'Content-Type': 'application/json' },

      try {
        const r = await fetch(`/session-delete?agent=${encodeURIComponent(agentId)}&sid=${encodeURIComponent(sessionId)}`, { method: 'POST' });

        const j = await r.json().catch(() => ({}));

    async function refreshDeletedList(force = false) {
      const now = Date.now();
      if (!force && deletedCacheAt && (now - deletedCacheAt < 2000)) return deletedCache;
      try {
        const r = await fetch('/sessions?includeDeleted=1', { cache: 'no-store' });
        if (!r.ok) return deletedCache;
        const j = await r.json();
        const agents = Array.isArray(j.agents) ? j.agents : [];
        const flattened = [];
        for (const a of agents) {
          const agentId = a.agentId || 'main';
          const deleted = Array.isArray(a.deleted) ? a.deleted : [];
          for (const item of deleted) {
            flattened.push({ ...item, agentId });
          }
        }
        deletedCache = flattened;
        deletedCacheAt = now;
        return deletedCache;
      } catch {
        return deletedCache;
      }
    }

    function upsert(e, isSnapshot = false){
      const agentId = e.agentId || 'main';
      const sessionId = e.sessionId || 'unknown';
      const k = makeKey(agentId, sessionId);
      const now=Date.now();
      const prev=state.get(k)||{interactions:[]};
      
      // 检查是否为新更新，以触发自动回归（unarchive）
      const newTs = new Date(e.ts).getTime();
      const oldTs = prev.lastTs ? new Date(prev.lastTs).getTime() : 0;
      
      // 如果已归档，且收到比当前记录更新的消息（排除初始快照加载旧数据的情况），则自动解除归档
      if (!isSnapshot && archived.has(k) && oldTs > 0 && newTs > oldTs) {
        archived.delete(k);
        saveArchived();
      }
      
      // 更新 interactions 列表
      let interactions = prev.interactions ? [...prev.interactions] : [];
      
      // 构建 interaction 对象
      let iType = 'Info';
      let iContent = '';

      const isToolResult = e.role === 'toolResult' || e.resultToolName || e.resultToolId;
      const text = e.textPreview || '';

      if (e.type === 'thinking_level_change') {
        iType = 'ThinkingChange';
        iContent = `thinking: ${e.thinkingLevel || 'unknown'}`;
      } else if (e.type === 'session') {
        iType = 'Session';
        iContent = `cwd: ${e.cwd || 'unknown'}`;
      } else if (e.type === 'custom' && e.customType === 'model-snapshot') {
        iType = 'ModelSwitch';
        iContent = `${e.provider || ''}/${e.model || ''}`;
      } else if (e.type === 'custom' && e.customType === 'openclaw:prompt-error') {
        iType = 'Error';
        iContent = `Error: ${e.errorMessage || 'unknown'}`;
      } else if (e.toolName) {
        iType = 'ToolCall';
        iContent = `Call: ${e.toolName}`;
      } else if (isToolResult) {
        iType = 'ToolResult';
        iContent = `Result: ${e.resultToolName || e.resultToolId || 'tool'}`;
      } else if (e.role === 'user') {
        iType = 'User';
        iContent = text || 'User Input';
      } else if (e.role === 'assistant') {
        iType = 'Bot';
        iContent = text || (e.stopReason ? `Stop: ${e.stopReason}` : 'Response');
      } else if (e.role === 'system') {
        iType = 'System';
        iContent = 'System Instruction';
      } else if (text) {
        iType = 'Info';
        iContent = text;
      }

      // 简单的去重指纹
      const fingerprint = `${e.ts}_${iType}_${iContent}`;
      const exists = interactions.some(item => `${item.ts}_${item.type}_${item.content}` === fingerprint);

      if (!exists && iContent) {
        interactions.push({
          ts: e.ts,
          type: iType,
          content: iContent,
          model: e.model,
          usage: e.usage,
          role: e.role,
          provider: e.provider,
          toolName: e.toolName,
          toolArgs: e.toolArgs,
          resultToolName: e.resultToolName,
          resultToolId: e.resultToolId,
          stopReason: e.stopReason,
          errorMessage: e.errorMessage,
          msgId: e.msgId,
          textPreview: text,
          fullContent: e.fullContent,
          api: e.api,
          isError: e.isError,
          details: e.details,
          thinkingLevel: e.thinkingLevel,
          cwd: e.cwd,
        });
        
        // 排序
        interactions.sort((a, b) => new Date(b.ts).getTime() - new Date(a.ts).getTime());
        // 限制数量
        if (interactions.length > 50) interactions = interactions.slice(0, 50);
      }
      
      // 计算累计 Token 消耗 (Local visible)
      const localTokens = interactions.reduce((acc, curr) => {
        if (curr.usage) {
          acc.input += (curr.usage.input || 0);
          acc.output += (curr.usage.output || 0);
        }
        return acc;
      }, { input: 0, output: 0 });
      
      // Prefer server-provided total if available (from snapshot stats), otherwise use local
      const finalTokens = prev.serverTotalTokens || localTokens;

      state.set(k,{...prev,...e,agentId,sessionId,lastTs:e.ts, bumpTs: isSnapshot ? (prev.bumpTs||now) : now, updatedAt: isSnapshot ? (prev.updatedAt||now) : now, interactions, totalTokens: finalTokens});
      render();
    }
    
    function getContextWindow(model) {
      const m = String(model || '').toLowerCase();
      // 已知超大上下文模型
      if (m.includes('claude-opus-4') || m.includes('claude-sonnet-4') || m.includes('claude-haiku-4')) return 1280000;
      if (m.includes('gemini-1.5') || m.includes('gemini-2')) return 1000000;
      if (m.includes('gpt-5') || m.includes('gpt-4o') || m.includes('gpt-4-turbo')) return 128000;
      if (m.includes('claude-3-5') || m.includes('claude-3.5')) return 200000;
      if (m.includes('claude-3')) return 200000;
      if (m.includes('deepseek')) return 128000;
      // 默认：200K
      return 200000;
    }

    function computeLatestTurnTiming(interactions) {
      // Walk interactions (newest-first) to find the last complete turn
      const items = (interactions || []).slice().reverse(); // oldest-first
      const msgs = items.filter(i => i && (i.role === 'user' || i.role === 'assistant' || i.role === 'toolResult'));
      let lastTurn = null;
      let curTurn = null;
      let prevTs = null;
      function tsMs(ts) { return typeof ts === 'number' ? (ts > 1e12 ? ts : ts) : new Date(ts).getTime(); }
      for (const evt of msgs) {
        const evtMs = tsMs(evt.ts);
        if (evt.role === 'user') {
          if (curTurn && curTurn.phases.length) lastTurn = curTurn;
          curTurn = { llmMs: 0, toolMs: 0, totalMs: 0, phases: [] };
          prevTs = evtMs;
          curTurn._startTs = evtMs;
          continue;
        }
        if (!curTurn) { prevTs = evtMs; continue; }
        if (evt.role === 'assistant') {
          const dur = Math.max(0, evtMs - (prevTs || evtMs));
          curTurn.phases.push({ type: 'llm', durationMs: dur });
          curTurn.llmMs += dur;
          if (!evt.toolName) { curTurn._endTs = evtMs; }
          prevTs = evtMs;
        }
        if (evt.role === 'toolResult') {
          const dur = (evt.details && evt.details.durationMs) ? evt.details.durationMs : Math.max(0, evtMs - (prevTs || evtMs));
          curTurn.phases.push({ type: 'tool', durationMs: dur });
          curTurn.toolMs += dur;
          prevTs = evtMs;
        }
      }
      if (curTurn && curTurn.phases.length) lastTurn = curTurn;
      if (!lastTurn) return null;
      lastTurn.totalMs = lastTurn.llmMs + lastTurn.toolMs;
      return lastTurn;
    }
    function fmtDurShort(ms) {
      if (ms < 1000) return ms + 'ms';
      if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
      return (ms / 60000).toFixed(1) + 'min';
    }

      const currentMsg = (extractTextFromFullContent(s.fullContent) || s.textPreview || '').trim();

      const currentStep = getCurrentStepLabel(s);

      const ctxLen = latestUsage ? (latestUsage.input||0) + (latestUsage.cacheRead||0) + (latestUsage.cacheWrite||0) : 0;

            </div>
            ${(() => {
              const tt = computeLatestTurnTiming(interactions);
              if (!tt || !tt.totalMs) return '';

    let _renderScheduled = false;
    function render(){
      if (_renderScheduled) return;

      requestAnimationFrame(() => {
        _renderScheduled = false;
        _doRender();
      });
    }
    function _doRender(){
      if (topologyViewActive) {
        renderTopologyView();
        return;
      }
      if (channelViewActive) {
        // 用户正在编辑备注时，跳过自动重渲（防止 input 失去焦点）
        if (editingNicknameKey) return;
        renderChannels();
        return;
      }
      const grid=document.getElementById('grid');
      // Save scroll positions before wiping DOM
      const scrollMap = new Map();
      grid.querySelectorAll('[data-scroll-id]').forEach(el => {
        scrollMap.set(el.dataset.scrollId, el.scrollTop);
      });
      grid.innerHTML='';
      const btnToggle = document.getElementById('btn-toggle-archived');
      if(btnToggle) btnToggle.textContent = showArchived ? '隐藏归档' : `显示归档 (${archived.size})`;

      if (btnDeleted) {
        const n = deletedCache && deletedCache.length ? deletedCache.length : 0;
        btnDeleted.textContent = `已删除 (${n})`;
      }

      const groups = new Map();
      for (const [key, s] of state.entries()) {
        const agentId = s.agentId || 'main';
        if (!groups.has(agentId)) groups.set(agentId, []);
        groups.get(agentId).push([key, s]);
      }
      const agentIds = [...groups.keys()].sort();
      const activeSet = expandedSessions.size ? new Set(expandedSessions) : null;
      if (!agentIds.length) {
        grid.innerHTML = '<div class="mono">暂无 session</div>';
        return;
      }
      agentIds.forEach((agentId) => {
        const allItems = groups.get(agentId) || [];
        const sorted = allItems.sort((a, b) => {
          const tsA = new Date(a[1].lastTs || 0).getTime();
          const tsB = new Date(b[1].lastTs || 0).getTime();
          if (tsB !== tsA) return tsB - tsA;
          return (b[1].bumpTs || 0) - (a[1].bumpTs || 0);
        });
        const items = sorted.filter(([key]) => showArchived ? true : !archived.has(key));
        const visibleItems = activeSet ? items.filter(([key]) => activeSet.has(key)) : items;
        const block = document.createElement('div');
        block.className = 'agent-block';
        const count = visibleItems.length;
        block.innerHTML = `
          <div class="agent-head">
            <div class="badge">Agent</div>
            <div class="mono">${escHtml(displayAgentName(agentId))}</div>
            <div class="badge">Sessions</div>
            <div class="mono">${count}</div>
          </div>
        `;
        const agentGrid = document.createElement('div');
        agentGrid.className = 'agent-grid';
        if (expandedSessions.size === 1) {
          agentGrid.style.gridTemplateColumns = 'minmax(0, 1fr)';
        } else {
          applyGridLayoutTo(agentGrid, Math.max(1, count));
        }
        visibleItems.forEach(([key, s], idx) => {
          const { sessionId } = parseKey(key);
          const isArchived = archived.has(key);
          const isPrimary = !isArchived && idx === 0;
          const now = Date.now();
          const isHighlight = s.updatedAt && (now - s.updatedAt < 3000);
          const isExpanded = expandedSessions.has(key);
          const isFullscreen = expandedSessions.size === 1 && isExpanded;
          const el = document.createElement('div');
          el.className = 'card' + (isPrimary ? ' primary' : '') + (isHighlight ? ' highlight' : '') + (isFullscreen ? ' fullscreen' : '');
          if (isArchived) el.style.opacity = '0.6';
          el.innerHTML = `
            <div class="row">
              <div class="badge">Session</div>
              <div class="mono">${escHtml(sessionId)}</div>
              <button class="btn-link" onclick="openHistory('${key}')">历史</button>
              <button class="btn-copy" onclick="copySessionDetail('${key}')">复制</button>
              <button class="btn-danger" onclick="softDeleteSession('${key}')">删除</button>
              <button class="btn-link" onclick="toggleDetails('${key}')">${isExpanded ? '取消激活' : '激活'}</button>
              <button class="btn-archive" onclick="toggleArchive('${key}')">${isArchived ? '取消归档' : '归档'}</button>

    const AGENT_COLORS = {
      main: { fill: '#1a3a66', stroke: '#3a78ff', text: '#a9c7ff' },
      nanbosirui: { fill: '#1a4a33', stroke: '#4caf50', text: '#a5d6a7' },
      nanbosuikesi: { fill: '#3d1a55', stroke: '#9c27b0', text: '#e1bee7' },
      _default: { fill: '#2a2a2a', stroke: '#777', text: '#bbb' },
    };
    function agentColor(id) { return AGENT_COLORS[id] || AGENT_COLORS._default; }

    const CHANNEL_COLORS = {
      feishu: '#4a6fa5', yach: '#3a78ff', telegram: '#2196f3', slack: '#e91e63',
      webchat: '#26a69a', openai: '#10a37f', heartbeat: '#ff7043', subagent: '#9c27b0',
      main: '#546e7a', _default: '#455a64',
    };
    function sessionNodeColor(ch) { return CHANNEL_COLORS[ch] || CHANNEL_COLORS._default; }

    async function pollTopology() {
      try {
        const r = await fetch('/api/topology', { cache: 'no-store' });
        if (!r.ok) return;
        topologyData = await r.json();
        computeTopologyLayout();
        if (topologyViewActive) renderTopoCanvas();
      } catch {}
    }

    function computeTopologyLayout() {
      if (!topologyData) return;
      const { agents, sessions, edges } = topologyData;
      const canvas = document.getElementById('topo-canvas');
      if (!canvas) return;
      const W = canvas.width / (window.devicePixelRatio || 1);
      const H = canvas.height / (window.devicePixelRatio || 1);
      const cx = W / 2, cy = H / 2;
      const agentR = Math.min(W, H) * 0.28;
      const nodes = [];
      const nodeMap = new Map(); // id -> node

      // Place agent nodes in a circle
      const sortedAgents = [...agents].sort((a, b) => a.id.localeCompare(b.id));
      sortedAgents.forEach((ag, i) => {
        const angle = (2 * Math.PI * i) / Math.max(sortedAgents.length, 1) - Math.PI / 2;
        const x = cx + agentR * Math.cos(angle);
        const y = cy + agentR * Math.sin(angle);
        const c = agentColor(ag.id);
        const node = { id: `agent:${ag.id}`, type: 'agent', x, y, r: 34, color: c.fill, stroke: c.stroke, textColor: c.text, label: ag.id, data: ag, fixed: true };
        nodes.push(node);
        nodeMap.set(node.id, node);
      });

      // Place session nodes clustered around their agent
      for (const ag of sortedAgents) {
        const agNode = nodeMap.get(`agent:${ag.id}`);
        if (!agNode) continue;
        const agSessions = sessions.filter(s => s.agentId === ag.id);
        const clusterR = 40 + Math.sqrt(agSessions.length) * 22;
        agSessions.forEach((sess, i) => {
          const angle = (2 * Math.PI * i) / Math.max(agSessions.length, 1);
          const x = agNode.x + clusterR * Math.cos(angle);
          const y = agNode.y + clusterR * Math.sin(angle);
          const ch = sess.channel || 'unknown';
          const node = {
            id: `session:${sess.id}`,
            type: 'session',
            x, y, r: 9,
            color: sessionNodeColor(ch),
            stroke: sess.isActive ? sessionNodeColor(ch) : '#333',
            textColor: '#a8b3bf',
            label: sess.isSubagent ? 'sub' : (ch.length > 8 ? ch.slice(0, 7) + '..' : ch),
            data: sess,
            parentAgent: ag.id,
            fixed: false,
          };
          nodes.push(node);
          nodeMap.set(node.id, node);
          // Also map by session key for edge resolution
          if (sess.key) nodeMap.set(`key:${sess.key}`, node);
        });
      }

      // Force simulation for session overlap prevention (50 iterations)
      for (let iter = 0; iter < 50; iter++) {
        for (let i = 0; i < nodes.length; i++) {
          if (nodes[i].fixed) continue;
          for (let j = i + 1; j < nodes.length; j++) {
            if (nodes[j].fixed && nodes[i].fixed) continue;
            const dx = nodes[j].x - nodes[i].x;
            const dy = nodes[j].y - nodes[i].y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const minDist = nodes[i].r + nodes[j].r + 8;
            if (dist < minDist) {
              const force = (minDist - dist) / dist * 0.5;
              const fx = dx * force, fy = dy * force;
              if (!nodes[i].fixed) { nodes[i].x -= fx; nodes[i].y -= fy; }
              if (!nodes[j].fixed) { nodes[j].x += fx; nodes[j].y += fy; }
            }
          }
          // Spring toward parent agent
          const parent = nodeMap.get(`agent:${nodes[i].parentAgent}`);
          if (parent) {
            const dx = nodes[i].x - parent.x;
            const dy = nodes[i].y - parent.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const agSess = sessions.filter(s => s.agentId === nodes[i].parentAgent);
            const targetDist = 40 + Math.sqrt(agSess.length) * 22;
            const springForce = (dist - targetDist) * 0.02;
            nodes[i].x -= (dx / dist) * springForce;
            nodes[i].y -= (dy / dist) * springForce;
          }
          // Boundary containment
          const pad = 20;
          nodes[i].x = Math.max(pad, Math.min(W - pad, nodes[i].x));
          nodes[i].y = Math.max(pad, Math.min(H - pad, nodes[i].y));
        }
      }

      // Build layout edges
      const layoutEdges = [];
      for (const edge of edges) {
        let srcNode = null, tgtNode = null;
        // Try to resolve by session
        if (edge.sourceSession) srcNode = nodeMap.get(`session:${edge.sourceSession}`);
        if (!srcNode && edge.sourceSessionKey) srcNode = nodeMap.get(`key:${edge.sourceSessionKey}`);
        if (!srcNode && edge.sourceAgent) srcNode = nodeMap.get(`agent:${edge.sourceAgent}`);
        if (edge.targetSession) tgtNode = nodeMap.get(`session:${edge.targetSession}`);
        if (!tgtNode && edge.targetSessionKey) tgtNode = nodeMap.get(`key:${edge.targetSessionKey}`);
        if (!tgtNode && edge.targetAgent) tgtNode = nodeMap.get(`agent:${edge.targetAgent}`);
        if (srcNode && tgtNode && srcNode !== tgtNode) {
          let color = '#3a78ff'; // send = blue
          if (edge.type === 'spawn' || edge.type === 'spawn-result') color = '#9c27b0'; // spawn = purple
          if (edge.meta && edge.meta.status === 'error') color = '#f44336';
          if (edge.meta && edge.meta.status === 'forbidden') color = '#ff9800';
          if (edge.meta && edge.meta.status === 'timeout') color = '#ff9800';
          layoutEdges.push({ source: srcNode, target: tgtNode, type: edge.type, meta: edge.meta || {}, color });
        }
      }

      topoNodes = nodes;
      topoEdges = layoutEdges;
    }

    function renderTopoCanvas() {
      const canvas = document.getElementById('topo-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.width / dpr;
      const H = canvas.height / dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.translate(topoPan.x, topoPan.y);
      ctx.scale(topoZoom, topoZoom);

      // Draw agent-to-session connecting lines
      for (const n of topoNodes) {
        if (n.type !== 'session') continue;
        const parent = topoNodes.find(p => p.id === `agent:${n.parentAgent}`);
        if (!parent) continue;
        ctx.beginPath();
        ctx.moveTo(parent.x, parent.y);
        ctx.lineTo(n.x, n.y);
        ctx.strokeStyle = 'rgba(58,90,120,.25)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Draw relationship edges (curved bezier with arrowheads)
      for (const e of topoEdges) {
        const sx = e.source.x, sy = e.source.y;
        const tx = e.target.x, ty = e.target.y;
        const mx = (sx + tx) / 2, my = (sy + ty) / 2;
        // offset control point perpendicular to the line
        const dx = tx - sx, dy = ty - sy;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len, ny = dx / len;
        const cpx = mx + nx * len * 0.2, cpy = my + ny * len * 0.2;

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo(cpx, cpy, tx, ty);
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 2;
        if (e.meta.status === 'forbidden') ctx.setLineDash([4, 4]);
        else ctx.setLineDash([]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Arrowhead at target
        const t = 0.85; // position along curve
        const ax = (1-t)*(1-t)*sx + 2*(1-t)*t*cpx + t*t*tx;
        const ay = (1-t)*(1-t)*sy + 2*(1-t)*t*cpy + t*t*ty;
        const adx = tx - ax, ady = ty - ay;
        const aLen = Math.sqrt(adx*adx + ady*ady) || 1;
        const arrowSize = 8;
        const arrAngle = Math.PI / 6;
        const ux = adx / aLen, uy = ady / aLen;
        ctx.beginPath();
        ctx.moveTo(tx - e.target.r * ux, ty - e.target.r * uy);
        ctx.lineTo(tx - (e.target.r + arrowSize) * ux - arrowSize * Math.sin(arrAngle) * (-uy),
                   ty - (e.target.r + arrowSize) * uy - arrowSize * Math.sin(arrAngle) * ux);
        ctx.lineTo(tx - (e.target.r + arrowSize) * ux + arrowSize * Math.sin(arrAngle) * (-uy),
                   ty - (e.target.r + arrowSize) * uy + arrowSize * Math.sin(arrAngle) * ux);
        ctx.closePath();
        ctx.fillStyle = e.color;
        ctx.fill();

        // Edge label
        const labelX = cpx, labelY = cpy - 8;
        ctx.font = '10px -apple-system, sans-serif';
        ctx.fillStyle = 'rgba(200,220,240,.6)';
        ctx.textAlign = 'center';
        const edgeLabel = e.type === 'spawn' ? 'spawn' : e.type === 'spawn-result' ? 'result' : e.type === 'send-incoming' ? 'recv' : 'send';
        ctx.fillText(e.meta.status ? `${edgeLabel} (${e.meta.status})` : edgeLabel, labelX, labelY);
      }

      // Draw nodes
      const now = Date.now();
      for (const n of topoNodes) {
        const isSelected = topoSelectedNode && topoSelectedNode.id === n.id;
        const isHovered = topoHoverNode && topoHoverNode.id === n.id;

        // Active pulse animation for session nodes
        if (n.type === 'session' && n.data && n.data.isActive) {
          const pulse = Math.sin(now / 500) * 0.3 + 0.7;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r + 4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${hexToRgb(n.color)}, ${pulse * 0.25})`;
          ctx.fill();
        }

        // Node circle
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = n.color;
        ctx.fill();
        ctx.strokeStyle = isSelected ? '#fff' : isHovered ? '#aaa' : n.stroke;
        ctx.lineWidth = isSelected ? 2.5 : isHovered ? 2 : 1.2;
        ctx.stroke();

        // Label
        ctx.font = n.type === 'agent' ? 'bold 13px -apple-system, sans-serif' : '10px -apple-system, sans-serif';
        ctx.fillStyle = n.textColor;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (n.type === 'agent') {
          ctx.fillText(n.label, n.x, n.y);
          // Session count below
          ctx.font = '10px -apple-system, sans-serif';
          ctx.fillStyle = 'rgba(200,220,240,.5)';
          ctx.fillText(`${n.data.activeSessionCount || 0} sessions`, n.x, n.y + n.r + 12);
          // Token count
          const totalTok = (n.data.totalTokens ? n.data.totalTokens.input + n.data.totalTokens.output : 0);
          if (totalTok > 0) {
            ctx.fillText(formatCompactTokens(totalTok), n.x, n.y + n.r + 24);
          }
        } else {
          ctx.fillText(n.label, n.x, n.y + n.r + 10);
        }
      }

      ctx.restore();
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `${parseInt(result[1],16)},${parseInt(result[2],16)},${parseInt(result[3],16)}` : '100,100,100';
    }

    function formatCompactTokens(n) {
      if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(n);
    }

    function startTopoAnimation() {
      if (topoAnimFrame) return;
      function loop() {
        if (!topologyViewActive) { topoAnimFrame = null; return; }
        renderTopoCanvas();
        topoAnimFrame = requestAnimationFrame(loop);
      }
      topoAnimFrame = requestAnimationFrame(loop);
    }

    // --- Canvas interaction ---
    function topoHitTest(mx, my) {
      // Transform mouse coords through pan/zoom
      const x = (mx - topoPan.x) / topoZoom;
      const y = (my - topoPan.y) / topoZoom;
      // Check nodes in reverse order (top-drawn first for hit)
      for (let i = topoNodes.length - 1; i >= 0; i--) {
        const n = topoNodes[i];
        const dx = x - n.x, dy = y - n.y;
        if (dx * dx + dy * dy <= (n.r + 4) * (n.r + 4)) return n;
      }
      return null;
    }

    function setupTopoCanvasEvents() {
      const canvas = document.getElementById('topo-canvas');
      if (!canvas || canvas._topoEventsAttached) return;
      canvas._topoEventsAttached = true;

      canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const hit = topoHitTest(mx, my);
        if (hit && !hit.fixed) {
          topoDragging = { node: hit, offsetX: (mx - topoPan.x) / topoZoom - hit.x, offsetY: (my - topoPan.y) / topoZoom - hit.y };
        } else if (!hit) {
          topoPanStart = { x: topoPan.x, y: topoPan.y, mx: e.clientX, my: e.clientY };
        }
      });

      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        if (topoDragging) {
          topoDragging.node.x = (mx - topoPan.x) / topoZoom - topoDragging.offsetX;
          topoDragging.node.y = (my - topoPan.y) / topoZoom - topoDragging.offsetY;
          return;
        }
        if (topoPanStart) {
          topoPan.x = topoPanStart.x + (e.clientX - topoPanStart.mx);
          topoPan.y = topoPanStart.y + (e.clientY - topoPanStart.my);
          return;
        }
        const hit = topoHitTest(mx, my);
        topoHoverNode = hit;
        canvas.style.cursor = hit ? 'pointer' : 'grab';
      });

      canvas.addEventListener('mouseup', (e) => {
        if (topoDragging) { topoDragging = null; return; }
        if (topoPanStart) {
          const moved = Math.abs(e.clientX - topoPanStart.mx) + Math.abs(e.clientY - topoPanStart.my);
          topoPanStart = null;
          if (moved > 5) return; // was a pan, not click
        }
        // Click
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const hit = topoHitTest(mx, my);
        if (hit) {
          topoSelectedNode = { type: hit.type, id: hit.id };
          topoSidePanelTab = hit.type === 'agent' ? 'agent' : 'session';
          renderTopoSidePanel();
        } else {
          topoSelectedNode = null;
          renderTopoSidePanel();
        }
      });

      canvas.addEventListener('mouseleave', () => {
        topoDragging = null;
        topoPanStart = null;
        topoHoverNode = null;
      });

      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.max(0.3, Math.min(3.0, topoZoom * delta));
        // Zoom toward mouse position
        topoPan.x = mx - (mx - topoPan.x) * (newZoom / topoZoom);
        topoPan.y = my - (my - topoPan.y) * (newZoom / topoZoom);
        topoZoom = newZoom;
      }, { passive: false });
    }

    function resizeTopoCanvas() {
      const wrap = document.getElementById('topo-canvas-wrap');
      const canvas = document.getElementById('topo-canvas');
      if (!wrap || !canvas) return;
      const dpr = window.devicePixelRatio || 1;
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      if (topologyData) { computeTopologyLayout(); renderTopoCanvas(); }
    }

                <div class="topo-tab ${topoSidePanelTab==='session'?'active':''}" onclick="topoSidePanelTab='session';renderTopoSidePanel();document.querySelectorAll('.topo-tab').forEach((t,i)=>{t.classList.toggle('active',i===1)})">Session</div>

    }

    function renderTopoSidePanel() {
      const panel = document.getElementById('topo-panel');
      if (!panel) return;
      if (!topoSelectedNode) {
        panel.innerHTML = '<div class="mono" style="padding:20px;color:#7aa2d5">点击节点查看详情</div>';
        return;
      }
      if (topoSidePanelTab === 'agent') {
        renderTopoAgentPanel(panel);
      } else {
        renderTopoSessionPanel(panel);
