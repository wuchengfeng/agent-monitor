<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Monitor</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:#0b0f14;color:#e6eef8;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    header{padding:12px 16px;background:#0e1621;border-bottom:1px solid #1c2834;position:sticky;top:0;flex:0 0 auto}
    h1{font-size:18px;margin:0}
    #grid{display:flex;flex-direction:column;gap:12px;padding:12px;flex:1;min-height:0;overflow:auto;align-content:stretch;justify-content:stretch}
    .agent-block{border:1px solid #1c2834;border-radius:10px;background:#0e1621;padding:10px;display:flex;flex-direction:column;gap:10px}
    .agent-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .agent-grid{display:grid;gap:12px}
    .card{background:#111a24;border:1px solid #1c2834;border-radius:8px;padding:12px;min-height:0;height:100%;display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease}
    .card.primary{border-color:#2e7d32;box-shadow:0 0 0 1px rgba(46,125,50,.35),0 10px 28px rgba(46,125,50,.18)}
    .card.highlight{border-color:#3a78ff;box-shadow:0 0 0 1px rgba(58,120,255,.45),0 10px 28px rgba(58,120,255,.18);animation:bump .45s ease}
    @keyframes bump{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-4px) scale(1.02)}100%{transform:translateY(0) scale(1)}}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .badge{font-size:12px;padding:2px 6px;border-radius:6px;border:1px solid #2a3e52;color:#d6e7ff}
    .title{font-weight:600;color:#cfe3ff}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;color:#a8b3bf;word-break:break-all}
    .ts{color:#7aa2d5;font-size:12px}
    .card-body{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,2fr);gap:10px;margin-top:10px}
    .card.fullscreen .card-body{grid-template-columns:minmax(0,1fr) minmax(0,2fr)}
    .pane{border:1px solid #1c2834;border-radius:8px;background:#0e1621;min-height:0;display:flex;flex-direction:column;overflow:hidden}
    .pane-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #1c2834;background:#0b0f14}
    .pane-title{font-size:13px;font-weight:700;color:#e8f2ff;letter-spacing:.2px}
    .pane-sub{font-size:11px;color:#7aa2d5}
    .pane-main{flex:1;min-height:0;display:flex;flex-direction:column}
    .pane-list{flex:1;min-height:0;overflow:auto}
    .pane-detail{flex:0 0 auto;max-height:48%;overflow:auto;border-top:1px solid #1c2834;padding:10px}
    .card.fullscreen .pane-detail{max-height:55%}
    .list-row{display:grid;grid-template-columns:52px max-content 92px 1fr;gap:8px;padding:7px 10px;border-bottom:1px dashed #243444;align-items:center;font-size:12px}
    .list-row:hover{background:#0b0f14}
    .list-row.selected{background:rgba(58,120,255,.12);border-bottom-color:rgba(58,120,255,.35)}
    .cell-time{color:#5c6b7f;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .cell-type{color:#a8b3bf;font-weight:700;display:flex;gap:6px;align-items:center;overflow:visible;min-width:0}
    .cell-tokens{color:#4caf50;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .cell-snippet{color:#7aa2d5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .detail-title{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .detail-block{margin-top:10px;white-space:pre-wrap;word-break:break-word;line-height:1.45;font-size:12px;color:#e6eef8}
    .detail-meta{margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:#a8b3bf}
    .detail-box{margin-top:10px;border:1px solid #2a3e52;border-radius:6px;background:#0b0f14;padding:8px;white-space:pre-wrap;word-break:break-word;font-size:13px;color:#d0dae5}
    .health{margin-top:6px}
    .health-head{display:flex;gap:8px;align-items:center;font-size:12px;color:#a8b3bf}
    .health-bar{position:relative;margin-top:6px;height:10px;border-radius:6px;border:1px solid #2a3e52;background:#13202e;overflow:visible}
    .health-fill{position:relative;height:100%;border-radius:6px}
    .mini-timing{margin-top:6px}
    .mini-timing-head{display:flex;gap:8px;align-items:center;font-size:11px;color:#a8b3bf}
    .mini-timing-head .llm-c{color:#5288c1}
    .mini-timing-head .tool-c{color:#e88b4d}
    .mini-timing-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:#13202e;margin-top:4px;border:1px solid #2a3e52}
    .mini-timing-bar .mt-llm{background:#2b5278;height:100%}
    .mini-timing-bar .mt-tool{background:#e88b4d;height:100%}
    .logs-container {margin-top:8px;height:220px;overflow-y:auto;border-top:1px solid #1c2834;padding-top:4px;background:#0e1621;border-radius:4px;padding:6px}
    .logs-container::-webkit-scrollbar {width:6px}
    .logs-container::-webkit-scrollbar-track {background:#111a24}
    .logs-container::-webkit-scrollbar-thumb {background:#243444;border-radius:3px}
    .btn-archive{margin-left:auto;cursor:pointer;opacity:0.6;font-size:12px;padding:2px 8px;border:1px solid #243444;border-radius:4px;color:#a9c7e7;background:transparent}
    .btn-archive:hover{opacity:1;background:#1c2834}
    .btn-danger{cursor:pointer;opacity:0.7;font-size:12px;padding:2px 8px;border:1px solid #5c2a2a;border-radius:4px;color:#ffb4b4;background:transparent}
    .btn-danger:hover{opacity:1;background:#2a1717}
    .btn-link{cursor:pointer;opacity:0.9;font-size:12px;padding:2px 8px;border:1px solid #243444;border-radius:4px;color:#7aa2d5;background:transparent}
    .btn-link:hover{background:#1c2834}
    .btn-copy{cursor:pointer;opacity:0.95;font-size:12px;padding:2px 8px;border:1px solid #2a3e52;border-radius:4px;color:#cfe3ff;background:transparent}
    .btn-copy:hover{background:#13202e}
    .header-row{display:flex;align-items:center;justify-content:space-between}
    .toggle-archived{cursor:pointer;font-size:12px;color:#7aa2d5;border:1px solid #243444;padding:4px 8px;border-radius:4px;background:#0e1621}
    .toggle-archived:hover{background:#1c2834}
    .stats-table {width:100%;font-size:11px;border-collapse:collapse;margin-top:8px;color:#a8b3bf}
    .stats-table th, .stats-table td {text-align:left;padding:2px 4px;border-bottom:1px solid #1c2834}
    .stats-table th {color:#7aa2d5}
    .toggle-details {cursor:pointer;color:#3a78ff;font-size:12px;margin-top:6px;display:inline-block}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;padding:48px 16px;z-index:1000}
    .panel{width:min(900px, 100%);background:#0e1621;border:1px solid #243444;border-radius:10px;box-shadow:0 14px 50px rgba(0,0,0,.5);overflow:hidden}
    .panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #1c2834}
    .panel-body{padding:12px 14px;max-height:70vh;overflow:auto}
    .panel-row{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1c2834}
    .tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;line-height:1;padding:2px 8px;border-radius:999px;border:1px solid #243444;background:#0b0f14;color:#e8f2ff;white-space:nowrap}
    .tag-openai{border-color:#234a86;background:rgba(58,120,255,.15);color:#a9c7ff}
    .tag-anthropic{border-color:#7a4a16;background:rgba(255,167,38,.14);color:#ffcc80}
    .tag-google{border-color:#1b6b4e;background:rgba(76,175,80,.12);color:#a5d6a7}
    .tag-qwen{border-color:#5e2a86;background:rgba(156,39,176,.12);color:#e1bee7}
    .tag-deepseek{border-color:#4c4c4c;background:rgba(158,158,158,.12);color:#e0e0e0}
    .tag-other{border-color:#2c3c4d;background:rgba(122,162,213,.10);color:#cfe3ff}

    /* LLM capture list */
    #llm-captures-list{display:flex;flex-direction:column;gap:4px;padding:8px 6px !important}
    #llm-captures-list .llm-cap-row{
      border:1px solid #2b3c4f !important;
      border-bottom:1px solid #2b3c4f !important;
      border-radius:10px;
      background:#101b27;
      transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease;
    }
    #llm-captures-list .llm-cap-row:hover{
      transform:translateX(4px);
      background:#152434 !important;
      border-color:#4b6f93 !important;
      box-shadow:0 8px 18px rgba(0,0,0,.32);
    }
    #llm-captures-list .llm-cap-row.selected{
      background:rgba(58,120,255,.26) !important;
      border-color:rgba(120,170,255,.85) !important;
      box-shadow:0 0 0 1px rgba(120,170,255,.45),0 10px 24px rgba(58,120,255,.26);
    }
  </style>
  <script>
    const state = new Map(); // agentId:sessionId -> { data..., lastTs, bumpTs, updatedAt, interactions: [] }
    // 归档 Set
    const archived = new Set(JSON.parse(localStorage.getItem('agent_monitor_archived') || '[]'));
    let showArchived = false;
    // 频道视图
    let channelViewActive = false;
    let channelData = []; // [{ agentId, sessionKey, sessionId, channel, chatType, senderId, senderLabel, accountId, updatedAt }]
    let channelNicknames = {}; // { "feishu:direct:ou_xxx": "峰哥", ... }
    let editingNicknameKey = null; // 当前正在编辑备注的 key
    const expandedSessions = new Set(); // 用于记录展开了详情的 sessionId
    const selectedStepIndexBySession = new Map();
    const selectedApiIndexBySession = new Map();
    let deletedPanelOpen = false;
    let deletedCache = [];
    let deletedCacheAt = 0;

    // --- LLM Capture state ---
    const llmCaptures = [];        // array of capture summaries from SSE/polling
    const llmCapturesFull = new Map(); // captureId -> full capture body (lazy loaded)
    let llmCapturesPanelOpen = false;
    let selectedCaptureId = null;
    let llmCaptureDetailExpanded = new Set(); // track which sections are expanded

    function saveArchived() {
      localStorage.setItem('agent_monitor_archived', JSON.stringify([...archived]));
    }

    function toggleArchive(key) {
      if (archived.has(key)) {
        archived.delete(key);
      } else {
        archived.add(key);
      }
      saveArchived();
      render();
    }
    
    function toggleDetails(key) {
      if (expandedSessions.has(key)) {
        expandedSessions.delete(key);
      } else {
        expandedSessions.add(key);
      }
      render();
    }

    function toggleShowArchived() {
      showArchived = !showArchived;
      render();
    }

    // --- LLM Capture functions ---
    function handleLlmCaptureEvent(ev) {
      // Deduplicate by captureId
      if (llmCaptures.some(c => c._id === ev.captureId)) return;
      llmCaptures.unshift({
        _id: ev.captureId,
        capturedAt: ev.capturedAt,
        model: ev.model,
        messageCount: ev.messageCount,
        toolCount: ev.toolCount,
        durationMs: ev.durationMs,
        requestSize: ev.requestSize,
        responseSize: ev.responseSize,
      });
      if (llmCaptures.length > 200) llmCaptures.pop();
      if (llmCapturesPanelOpen) renderLlmCapturesPanel();
    }

    async function pollLlmCaptures() {
      try {
        const resp = await fetch('/api/llm-captures?limit=100');
        const list = await resp.json();
        for (const c of list) {
          if (!llmCaptures.some(x => x._id === c._id)) {
            llmCaptures.push(c);
          }
        }
        llmCaptures.sort((a, b) => (b._id || 0) - (a._id || 0));
      } catch {}
    }

    async function fetchCaptureDetail(id) {
      if (llmCapturesFull.has(id)) return llmCapturesFull.get(id);
      try {
        const resp = await fetch(`/api/llm-capture/${id}`);
        const data = await resp.json();
        llmCapturesFull.set(id, data);
        // Evict old entries if cache grows too large
        if (llmCapturesFull.size > 50) {
          const first = llmCapturesFull.keys().next().value;
          llmCapturesFull.delete(first);
        }
        return data;
      } catch { return null; }
    }

    function toggleLlmCapturesPanel() {
      llmCapturesPanelOpen = !llmCapturesPanelOpen;
      document.getElementById('llm-captures-overlay').style.display = llmCapturesPanelOpen ? 'flex' : 'none';
      if (llmCapturesPanelOpen) {
        pollLlmCaptures().then(() => renderLlmCapturesPanel());
      }
    }

    function selectCapture(id) {
      selectedCaptureId = id;
      llmCaptureDetailExpanded = new Set();
      fetchCaptureDetail(id).then(() => renderLlmCapturesPanel());
    }

    function toggleCaptureSection(section) {
      if (llmCaptureDetailExpanded.has(section)) {
        llmCaptureDetailExpanded.delete(section);
      } else {
        llmCaptureDetailExpanded.add(section);
      }
      renderLlmCapturesPanel();
    }

    function copyCaptureJson() {
      const data = llmCapturesFull.get(selectedCaptureId);
      if (data) {
        navigator.clipboard.writeText(JSON.stringify(data.request, null, 2)).catch(() => {});
      }
    }

    function renderLlmCapturesPanel() {
      const listEl = document.getElementById('llm-captures-list');
      const detailEl = document.getElementById('llm-captures-detail');
      if (!listEl) return;

      // Render list
      listEl.innerHTML = llmCaptures.length ? llmCaptures.map(c => {
        const sel = c._id === selectedCaptureId ? 'selected' : '';
        const t = fmtTimeHms(c.capturedAt);
        const sizeKB = Math.round((c.requestSize || 0) / 1024);
        const model = (c.model||'?').split('/').pop();
        const dur = c.durationMs ? (c.durationMs/1000).toFixed(1)+'s' : '';
        return `<div class="list-row llm-cap-row ${sel}" onclick="selectCapture(${c._id})" style="grid-template-columns:56px 1fr;gap:6px;align-items:center;padding:8px 10px">
          <div class="cell-time">${t}</div>
          <div style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:11px">
            <span class="tag tag-other" style="font-size:10px">${escHtml(model)}</span>
            <span class="mono" style="opacity:.7">${c.messageCount||0}m ${c.toolCount||0}t ${sizeKB}KB ${dur}</span>
          </div>
        </div>`;
      }).join('') : '<div class="mono" style="padding:10px">暂无 LLM 请求捕获。请确保 mitmproxy 已启动。</div>';

      // Render detail
      if (!detailEl) return;
      const capture = llmCapturesFull.get(selectedCaptureId);
      if (!capture) {
        detailEl.innerHTML = '<div class="mono" style="padding:10px">点击左侧列表查看详情</div>';
        return;
      }

      const req = capture.request || {};
      const messages = req.messages || [];
      const tools = req.tools || [];
      const resp = capture.response || {};

      // Params section (always visible)
      const params = ['model','temperature','max_tokens','max_completion_tokens','top_p','stream','stop','frequency_penalty','presence_penalty']
        .filter(k => req[k] !== undefined)
        .map(k => `<span class="badge">${k}: ${JSON.stringify(req[k])}</span>`)
        .join(' ');

      // System prompt
      const sysMessages = messages.filter(m => m.role === 'system' || m.role === 'developer');
      const sysExpanded = llmCaptureDetailExpanded.has('system');
      const sysContent = sysMessages.map(m => typeof m.content === 'string' ? m.content : JSON.stringify(m.content)).join('\n---\n');
      const sysSection = sysMessages.length ? `
        <div style="margin-top:10px">
          <div class="row" style="gap:8px;cursor:pointer" onclick="toggleCaptureSection('system')">
            <div class="badge" style="background:#2b1a00;border-color:#5c3a00;color:#ffcc80">System Prompt</div>
            <span class="mono">${sysContent.length.toLocaleString()} chars</span>
            <span class="mono">${sysExpanded ? '▼' : '▶'}</span>
          </div>
          ${sysExpanded ? `<div class="detail-box" style="max-height:400px;overflow:auto">${escHtml(sysContent)}</div>` : ''}
        </div>` : '';

      // Conversation messages (non-system)
      const convMessages = messages.filter(m => m.role !== 'system' && m.role !== 'developer');
      const msgsExpanded = llmCaptureDetailExpanded.has('messages');
      let msgsInner = '';
      if (msgsExpanded) {
        const roleColors = {user:'#234a86',assistant:'#1b6b4e',tool:'#5e2a86'};
        msgsInner = '<div style="margin-top:6px">' + convMessages.map(function(m, i) {
          var msgKey = 'msg_' + i;
          var msgExpanded = llmCaptureDetailExpanded.has(msgKey);
          var contentStr = typeof m.content === 'string' ? m.content : JSON.stringify(m.content, null, 2);
          var preview = contentStr.replace(/\s+/g, ' ').slice(0, 100);
          var rc = roleColors[m.role] || '#2c3c4d';
          var tcInfo = m.tool_calls ? ' [' + m.tool_calls.map(function(tc){ return tc.function && tc.function.name || tc.name || '?'; }).join(', ') + ']' : '';
          var detailBox = msgExpanded
            ? '<div class="detail-box" style="max-height:300px;overflow:auto">' + escHtml(contentStr) + (m.tool_calls ? '\n\n--- Tool Calls ---\n' + escHtml(JSON.stringify(m.tool_calls, null, 2)) : '') + '</div>'
            : '';
          return '<div style="margin-bottom:4px">'
            + '<div class="row" style="gap:6px;cursor:pointer" onclick="toggleCaptureSection(\'' + msgKey + '\')">'
            + '<span class="badge" style="border-color:' + rc + ';min-width:60px">' + escHtml(m.role) + '</span>'
            + '<span class="mono" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(preview) + escHtml(tcInfo) + '</span>'
            + '<span class="mono">' + (msgExpanded ? '▼' : '▶') + '</span>'
            + '</div>'
            + detailBox
            + '</div>';
        }).join('') + '</div>';
      }
      const msgsSection = `
        <div style="margin-top:10px">
          <div class="row" style="gap:8px;cursor:pointer" onclick="toggleCaptureSection('messages')">
            <div class="badge" style="background:#0a1a2e;border-color:#234a86;color:#a9c7ff">Messages (${convMessages.length})</div>
            <span class="mono">${msgsExpanded ? '▼' : '▶'}</span>
          </div>
          ${msgsInner}
        </div>`;

      // Tools
      const toolsExpanded = llmCaptureDetailExpanded.has('tools');
      const toolsSection = tools.length ? `
        <div style="margin-top:10px">
          <div class="row" style="gap:8px;cursor:pointer" onclick="toggleCaptureSection('tools')">
            <div class="badge" style="background:#1a0a2e;border-color:#5e2a86;color:#e1bee7">Tools (${tools.length})</div>
            <span class="mono">${toolsExpanded ? '▼' : '▶'}</span>
          </div>
          ${toolsExpanded ? `<div class="detail-box" style="max-height:400px;overflow:auto">${escHtml(JSON.stringify(tools, null, 2))}</div>` : ''}
        </div>` : '';

      // Response
      const respExpanded = llmCaptureDetailExpanded.has('response');
      const usageStr = resp.usage ? `in:${(resp.usage.prompt_tokens||resp.usage.input||0).toLocaleString()} out:${(resp.usage.completion_tokens||resp.usage.output||0).toLocaleString()}` : '';
      const respSection = `
        <div style="margin-top:10px">
          <div class="row" style="gap:8px;cursor:pointer" onclick="toggleCaptureSection('response')">
            <div class="badge" style="background:#0a2e1a;border-color:#1b6b4e;color:#a5d6a7">Response</div>
            <span class="mono">${usageStr}</span>
            <span class="mono">${capture.durationMs || 0}ms</span>
            <span class="mono">${respExpanded ? '▼' : '▶'}</span>
          </div>
          ${respExpanded ? `<div class="detail-box" style="max-height:300px;overflow:auto">${escHtml(JSON.stringify(resp, null, 2))}</div>` : ''}
        </div>`;

      detailEl.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div class="row" style="gap:6px;flex-wrap:wrap">${params}</div>
          <button class="btn-copy" onclick="copyCaptureJson()">复制请求 JSON</button>
        </div>
        ${sysSection}
        ${msgsSection}
        ${toolsSection}
        ${respSection}
      `;
    }

    function fmtTs(ts){try{const d=new Date(typeof ts==='number'?ts:Date.parse(ts));const date=`${d.getMonth()+1}-${String(d.getDate()).padStart(2,'0')}`;return `${date} ${d.toLocaleTimeString()}`}catch{return String(ts)}}
    function fmtTimeHms(ts){
      try{
        const d=new Date(typeof ts==='number'?ts:Date.parse(ts));
        return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');
      }catch{return '--:--:--'}
    }
    function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function tryPrettyJson(s){
      if (s == null) return '';
      if (typeof s === 'object') return JSON.stringify(s, null, 2);
      const str = String(s);
      try{
        const v = JSON.parse(str);
        return JSON.stringify(v, null, 2);
      }catch{
        return str;
      }
    }

    function extractTextFromFullContent(fullContent){
      if (!fullContent || !Array.isArray(fullContent)) return '';
      return fullContent
        .filter(x => x && x.type === 'text' && typeof x.text === 'string')
        .map(x => x.text)
        .join('\n')
        .trim();
    }

    function extractToolCallsFromFullContent(fullContent){
      if (!fullContent || !Array.isArray(fullContent)) return [];
      return fullContent
        .filter(x => x && x.type === 'toolCall')
        .map(x => ({
          id: x.id,
          name: x.name,
          arguments: x.arguments
        }));
    }

    function buildAssistantOutputText(fullContent, textPreview){
      const text = extractTextFromFullContent(fullContent) || String(textPreview || '').trim();
      const toolCalls = extractToolCallsFromFullContent(fullContent);
      if (!toolCalls.length) return text;
      const toolBlock = JSON.stringify(toolCalls, null, 2);
      return [text, text ? '' : '', 'toolCalls:', toolBlock].filter(Boolean).join('\n');
    }

    async function writeClipboard(text) {
      const payload = String(text == null ? '' : text);
      if (!payload.trim()) return false;
      try {
        await navigator.clipboard.writeText(payload);
        return true;
      } catch {
        try {
          const ta = document.createElement('textarea');
          ta.value = payload;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          ta.style.top = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          return !!ok;
        } catch {
          return false;
        }
      }
    }

    function displayAgentName(agentId){

    function makeKey(agentId, sessionId){
      return `${agentId}:${sessionId}`;

    function parseKey(key){
      const idx = key.indexOf(':');
      if (idx === -1) return { agentId: 'main', sessionId: key };
      return { agentId: key.slice(0, idx), sessionId: key.slice(idx + 1) };
    }

    function buildSessionCopyText(key, extra = {}) {
      const s = state.get(key) || {};
      const { agentId, sessionId } = parseKey(key);
      const interactions = Array.isArray(s.interactions) ? s.interactions : [];
      const last = interactions.slice(0, 20).map((it) => {
        const t = fmtTs(it.ts);
        const type = it.type || '-';
        const model = it.model ? ` ${it.model}` : '';
        const text = String(extractTextFromFullContent(it.fullContent) || it.textPreview || it.content || '').trim();
        return `- [${t}] ${type}${model}\n${text ? text : '-'}`;
      }).join('\n\n');

      const currentMsg = String((extractTextFromFullContent(s.fullContent) || s.textPreview || '')).trim();
      const toolArgs = s.toolArgs != null ? tryPrettyJson(s.toolArgs) : '';

      const header = [
        `agentId: ${displayAgentName(agentId)}`,
        `sessionId: ${sessionId}`,
        s.ts ? `ts: ${fmtTs(s.ts)}` : '',
        s.updatedAt ? `updatedAt: ${fmtTs(s.updatedAt)}` : '',
        s.role ? `role: ${s.role}` : '',
        s.provider ? `provider: ${s.provider}` : '',
        s.model ? `model: ${s.model}` : '',
        s.stopReason ? `stopReason: ${s.stopReason}` : '',
        s.toolName ? `toolName: ${s.toolName}` : '',
        s.errorMessage ? `error: ${s.errorMessage}` : '',
      ].filter(Boolean).join('\n');

      const parts = [
        header,
        toolArgs ? `\n---\ntoolArgs:\n${toolArgs}` : '',
        currentMsg ? `\n---\ncurrentMessage:\n${currentMsg}` : '',
        last ? `\n---\nrecentInteractions:\n${last}` : '',
        extra && extra.text ? `\n---\n${extra.title || 'extra'}:\n${extra.text}` : '',
      ].filter(Boolean);

      return parts.join('\n');
    }

    function findNearestUserInput(interactions, botTs){
      const target = new Date(botTs || 0).getTime();
      if (!Number.isFinite(target) || !Array.isArray(interactions)) return '';
      for (const it of interactions) {
        const t = new Date(it.ts || 0).getTime();
        if (!Number.isFinite(t)) continue;
        if (t <= target && it.role === 'user') {
          const text = extractTextFromFullContent(it.fullContent) || it.textPreview || it.content || '';
          return String(text).trim();
        }
      }
      return '';
    }
    function fmtCompact(n){
      const x = Number(n);
      if (!Number.isFinite(x)) return '0';
      const ax = Math.abs(x);
      const sign = x < 0 ? '-' : '';
      if (ax >= 1e9) return sign + (ax / 1e9).toFixed(1).replace(/\.0$/,'') + 'B';
      if (ax >= 1e6) return sign + (ax / 1e6).toFixed(1).replace(/\.0$/,'') + 'M';
      if (ax >= 1e3) return sign + (ax / 1e3).toFixed(1).replace(/\.0$/,'') + 'K';
      return String(x);
    }

    function upsert(e, isSnapshot = false){
      const agentId = e.agentId || 'main';
      const sessionId = e.sessionId || 'unknown';
      const k = makeKey(agentId, sessionId);
      const now=Date.now();
      const prev=state.get(k)||{interactions:[]};
      
      // 检查是否为新更新，以触发自动回归（unarchive）
      const newTs = new Date(e.ts).getTime();
      const oldTs = prev.lastTs ? new Date(prev.lastTs).getTime() : 0;
      
      // 如果已归档，且收到比当前记录更新的消息（排除初始快照加载旧数据的情况），则自动解除归档
      if (!isSnapshot && archived.has(k) && oldTs > 0 && newTs > oldTs) {
        archived.delete(k);
        saveArchived();
      }
      
      // 更新 interactions 列表
      let interactions = prev.interactions ? [...prev.interactions] : [];
      
      // 构建 interaction 对象
      let iType = 'Info';
      let iContent = '';

      const isToolResult = e.role === 'toolResult' || e.resultToolName || e.resultToolId;
      const text = e.textPreview || '';

      if (e.type === 'thinking_level_change') {
        iType = 'ThinkingChange';
        iContent = `thinking: ${e.thinkingLevel || 'unknown'}`;
      } else if (e.type === 'session') {
        iType = 'Session';
        iContent = `cwd: ${e.cwd || 'unknown'}`;
      } else if (e.type === 'custom' && e.customType === 'model-snapshot') {
        iType = 'ModelSwitch';
        iContent = `${e.provider || ''}/${e.model || ''}`;
      } else if (e.type === 'custom' && e.customType === 'openclaw:prompt-error') {
        iType = 'Error';
        iContent = `Error: ${e.errorMessage || 'unknown'}`;
      } else if (e.toolName) {
        iType = 'ToolCall';
        iContent = `Call: ${e.toolName}`;
      } else if (isToolResult) {
        iType = 'ToolResult';
        iContent = `Result: ${e.resultToolName || e.resultToolId || 'tool'}`;
      } else if (e.role === 'user') {
        iType = 'User';
        iContent = text || 'User Input';
      } else if (e.role === 'assistant') {
        iType = 'Bot';
        iContent = text || (e.stopReason ? `Stop: ${e.stopReason}` : 'Response');
      } else if (e.role === 'system') {
        iType = 'System';
        iContent = 'System Instruction';
      } else if (text) {
        iType = 'Info';
        iContent = text;
      }

      // 简单的去重指纹
      const fingerprint = `${e.ts}_${iType}_${iContent}`;
      const exists = interactions.some(item => `${item.ts}_${item.type}_${item.content}` === fingerprint);

      if (!exists && iContent) {
        interactions.push({
          ts: e.ts,
          type: iType,
          content: iContent,
          model: e.model,
          usage: e.usage,
          role: e.role,
          provider: e.provider,
          toolName: e.toolName,
          toolArgs: e.toolArgs,
          resultToolName: e.resultToolName,
          resultToolId: e.resultToolId,
          stopReason: e.stopReason,
          errorMessage: e.errorMessage,
          msgId: e.msgId,
          textPreview: text,
          fullContent: e.fullContent,
          api: e.api,
          isError: e.isError,
          details: e.details,
          thinkingLevel: e.thinkingLevel,
          cwd: e.cwd,
        });
        
        // 排序
        interactions.sort((a, b) => new Date(b.ts).getTime() - new Date(a.ts).getTime());
        // 限制数量
        if (interactions.length > 50) interactions = interactions.slice(0, 50);
      }
      
      // 计算累计 Token 消耗 (Local visible)
      const localTokens = interactions.reduce((acc, curr) => {
        if (curr.usage) {
          acc.input += (curr.usage.input || 0);
          acc.output += (curr.usage.output || 0);
        }
        return acc;
      }, { input: 0, output: 0 });
      
      // Prefer server-provided total if available (from snapshot stats), otherwise use local
      const finalTokens = prev.serverTotalTokens || localTokens;

      state.set(k,{...prev,...e,agentId,sessionId,lastTs:e.ts, bumpTs: isSnapshot ? (prev.bumpTs||now) : now, updatedAt: isSnapshot ? (prev.updatedAt||now) : now, interactions, totalTokens: finalTokens});
      render();
    }
    
    function getContextWindow(model) {
      const m = String(model || '').toLowerCase();
      // 已知超大上下文模型
      if (m.includes('claude-opus-4') || m.includes('claude-sonnet-4') || m.includes('claude-haiku-4')) return 1280000;
      if (m.includes('gemini-1.5') || m.includes('gemini-2')) return 1000000;
      if (m.includes('gpt-5') || m.includes('gpt-4o') || m.includes('gpt-4-turbo')) return 128000;
      if (m.includes('claude-3-5') || m.includes('claude-3.5')) return 200000;
      if (m.includes('claude-3')) return 200000;
      if (m.includes('deepseek')) return 128000;
      // 默认：200K
      return 200000;
    }

    function computeLatestTurnTiming(interactions) {
      // Walk interactions (newest-first) to find the last complete turn
      const items = (interactions || []).slice().reverse(); // oldest-first
      const msgs = items.filter(i => i && (i.role === 'user' || i.role === 'assistant' || i.role === 'toolResult'));
      let lastTurn = null;
      let curTurn = null;
      let prevTs = null;
      function tsMs(ts) { return typeof ts === 'number' ? (ts > 1e12 ? ts : ts) : new Date(ts).getTime(); }
      for (const evt of msgs) {
        const evtMs = tsMs(evt.ts);
        if (evt.role === 'user') {
          if (curTurn && curTurn.phases.length) lastTurn = curTurn;
          curTurn = { llmMs: 0, toolMs: 0, totalMs: 0, phases: [] };
          prevTs = evtMs;
          curTurn._startTs = evtMs;
          continue;
        }
        if (!curTurn) { prevTs = evtMs; continue; }
        if (evt.role === 'assistant') {
          const dur = Math.max(0, evtMs - (prevTs || evtMs));
          curTurn.phases.push({ type: 'llm', durationMs: dur });
          curTurn.llmMs += dur;
          if (!evt.toolName) { curTurn._endTs = evtMs; }
          prevTs = evtMs;
        }
        if (evt.role === 'toolResult') {
          const dur = (evt.details && evt.details.durationMs) ? evt.details.durationMs : Math.max(0, evtMs - (prevTs || evtMs));
          curTurn.phases.push({ type: 'tool', durationMs: dur });
          curTurn.toolMs += dur;
          prevTs = evtMs;
        }
      }
      if (curTurn && curTurn.phases.length) lastTurn = curTurn;
      if (!lastTurn) return null;
      lastTurn.totalMs = lastTurn.llmMs + lastTurn.toolMs;
      return lastTurn;
    }
    function fmtDurShort(ms) {
      if (ms < 1000) return ms + 'ms';
      if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
      return (ms / 60000).toFixed(1) + 'min';
    }

    function renderStepPane(key, interactions, isFullscreen){
      const steps = Array.isArray(interactions) ? interactions : [];
      const max = isFullscreen ? 10 : 7;
      const view = steps.slice(0, max);
      const sel = Math.min(Math.max(0, Number(selectedStepIndexBySession.get(key) || 0)), Math.max(0, view.length - 1));
      const listHtml = view.length ? view.map((i, idx) => {
        let snippet = i.textPreview || i.content || '';
        if (typeof snippet !== 'string') snippet = JSON.stringify(snippet);
        snippet = snippet.replace(/\s+/g, ' ').trim();
        if (snippet.length > 80) snippet = snippet.slice(0, 80) + '…';
        const errStyle = i.isError ? 'background:rgba(200,50,50,.12);' : '';
        const errDot = i.isError ? '<span style="color:#f15e5e;margin-right:4px">✕</span>' : '';
        const dur = i.details?.durationMs != null ? `<span style="color:#7aa2d5;font-family:ui-monospace,monospace">${i.details.durationMs}ms</span>` : '-';
        return `
          <div class="list-row ${idx===sel?'selected':''}" style="${errStyle}" onclick="selectStep('${key}', ${idx})">
            <div class="cell-time">${fmtTimeHms(i.ts)}</div>
            <div class="cell-type">${errDot}${escHtml(i.type || '-')}</div>
            <div class="cell-tokens">${dur}</div>
            <div class="cell-snippet" title="${escHtml(i.textPreview || i.content || '')}">${escHtml(snippet || '-')}</div>
          </div>
        `;
      }).join('') : `<div class="mono" style="padding:10px">暂无步骤</div>`;

      // Detail for selected step
      const selectedStep = view[sel] || null;
      let stepDetailHtml = '<div class="mono">暂无详情</div>';
      if (selectedStep) {
        const fullText = extractTextFromFullContent(selectedStep.fullContent) || selectedStep.textPreview || selectedStep.content || '';
        const toolCalls = extractToolCallsFromFullContent(selectedStep.fullContent);
        const textBlock = fullText
          ? `<div class="detail-box" style="color:#e6eef8;max-height:220px;overflow:auto">${escHtml(fullText)}</div>`
          : `<div class="detail-box" style="color:#5c6b7f;font-style:italic;max-height:220px;overflow:auto">无文本内容</div>`;
        const toolBlock = toolCalls.length
          ? toolCalls.map(tc => `<div class="detail-box" style="color:#e6eef8;max-height:220px;overflow:auto"><b>${escHtml(tc.name)}</b>\n${escHtml(tryPrettyJson(tc.arguments))}</div>`).join('')
          : '';
        const errBadge = selectedStep.isError ? `<span class="badge" style="background:rgba(200,50,50,.2);border-color:#f15e5e;color:#ffb4b4">isError</span>` : '';
        const detailsMeta = selectedStep.details ? (() => {
          const d = selectedStep.details;
          const parts = [];
          if (d.exitCode != null) parts.push(`exitCode: ${d.exitCode}`);
          if (d.durationMs != null) parts.push(`duration: ${d.durationMs}ms`);
          if (d.status) parts.push(`status: ${d.status}`);
          return parts.length ? `<div class="detail-meta">${parts.map(p=>`<span>${escHtml(p)}</span>`).join('')}</div>` : '';
        })() : '';
        const cwdBadge = selectedStep.cwd ? `<span class="badge" title="${escHtml(selectedStep.cwd)}">cwd: ${escHtml(selectedStep.cwd.split('/').slice(-2).join('/'))}</span>` : '';
        const thinkBadge = selectedStep.thinkingLevel != null ? `<span class="badge">thinking: ${escHtml(selectedStep.thinkingLevel)}</span>` : '';
        stepDetailHtml = `
          <div class="detail-title">
            <span class="badge">${escHtml(selectedStep.type||'-')}</span>
            <span class="ts">${fmtTs(selectedStep.ts)}</span>
            ${selectedStep.resultToolName ? `<span class="badge">${escHtml(selectedStep.resultToolName)}</span>` : ''}
            ${errBadge}
            ${cwdBadge}
            ${thinkBadge}
          </div>
          ${detailsMeta}
          ${textBlock}
          ${toolBlock}
        `;
      }

      const s = state.get(key) || {};
      const totalTokens = s.totalTokens || { input:0, output:0 };
      const fam = modelFamily(s.model || '');
      const modelRaw = s.model || '';
      const modelName = modelRaw ? modelRaw.split('/').pop() : '-';
      const modelTag = modelRaw ? `<span class="tag tag-${fam}" title="${escHtml(modelRaw)}">${escHtml(modelName)}</span>` : '';
      const err = s.errorMessage ? `<div class="mono" style="color:#ffb4b4">${escHtml(s.errorMessage)}</div>` : '';
      const toolArgs = s.toolArgs ? `<div class="detail-box" style="max-height:180px;overflow:auto">${escHtml(tryPrettyJson(s.toolArgs))}</div>` : '';
      const currentMsg = (extractTextFromFullContent(s.fullContent) || s.textPreview || '').trim();
      const currentMsgBlock = currentMsg
        ? `<div class="detail-box" style="color:#e6eef8;max-height:180px;overflow:auto">${escHtml(currentMsg)}</div>`
        : `<div class="detail-box" style="color:#5c6b7f;font-style:italic;max-height:180px;overflow:auto">当前步骤没有消息</div>`;
      const currentStep = getCurrentStepLabel(s);
      
      // 上下文长度：取最新一次 API 调用的 input+cacheRead+cacheWrite
      const latestApiCall = interactions.find(i => i && i.role === 'assistant' && i.usage);
      const latestUsage = latestApiCall?.usage || null;
      const ctxLen = latestUsage ? (latestUsage.input||0) + (latestUsage.cacheRead||0) + (latestUsage.cacheWrite||0) : 0;
      const ctxWindow = getContextWindow(s.model || '');
      const pct = Math.min(Math.round((ctxLen / ctxWindow) * 100), 200);
      const pctLabel = `${pct}%`;
      const healthColor = pct <= 50 ? '#35c46a' : (pct <= 75 ? '#edb232' : (pct <= 90 ? '#f15e5e' : '#d66bff'));
      const totalHuman = fmtCompact(ctxLen);

      return `
        <div class="pane">
          <div class="pane-head">
            <div class="pane-title">消息与步骤</div>
            <div class="row" style="gap:8px">
              <div class="pane-sub">${escHtml(view.length ? `最近 ${view.length} 条` : '')}</div>
              <button class="btn-copy" onclick="copyStepDetail('${key}')">复制</button>
            </div>
          </div>
          <div class="pane-main" style="padding:10px;gap:10px">
            <div class="row" style="gap:8px">
              <div class="badge">${escHtml(s.role||'n/a')}</div>
              <div class="badge">${escHtml(s.provider||'provider')}</div>
              ${modelTag}
              <div class="badge" title="${(totalTokens.input||0).toLocaleString()+'/'+(totalTokens.output||0).toLocaleString()}">${fmtCompact((totalTokens.input||0)+(totalTokens.output||0))}</div>
              <div class="ts">${fmtTs(s.ts)}</div>
            </div>
            <div class="health">
              <div class="health-head">
                <span class="badge">上下文</span>
                <span class="mono">${escHtml(pctLabel)}</span>
                <span class="mono">${escHtml(totalHuman)} / ${fmtCompact(ctxWindow)}</span>
              </div>
              <div class="health-bar">
                <div class="health-fill" style="width:${pct}%;background:${healthColor}"></div>
              </div>
            </div>
            ${(() => {
              const tt = computeLatestTurnTiming(interactions);
              if (!tt || !tt.totalMs) return '';
              const lPct = (tt.llmMs / tt.totalMs * 100).toFixed(1);
              const tPct = (tt.toolMs / tt.totalMs * 100).toFixed(1);
              return `<div class="mini-timing">
                <div class="mini-timing-head">
                  <span class="badge">最近一轮</span>
                  <span>${fmtDurShort(tt.totalMs)}</span>
                  <span class="llm-c">LLM ${fmtDurShort(tt.llmMs)}</span>
                  <span class="tool-c">Tool ${fmtDurShort(tt.toolMs)}</span>
                  <span>${tt.phases.length} phases</span>
                </div>
                <div class="mini-timing-bar">
                  <div class="mt-llm" style="width:${lPct}%"></div>
                  <div class="mt-tool" style="width:${tPct}%"></div>
                </div>
              </div>`;
            })()}
            <div class="row" style="gap:8px">
              <div class="badge">当前步骤</div>
              <div class="title">${escHtml(currentStep)}</div>
            </div>
            ${currentMsgBlock}
            ${err || ''}
            ${toolArgs || ''}
            <div class="pane-list" data-scroll-id="step-list-${key}">${listHtml}</div>
            <div class="pane-detail" data-scroll-id="step-detail-${key}">${stepDetailHtml}</div>
          </div>
        </div>
      `;
    }

    function renderApiPane(key, interactions, isFullscreen){
      const all = Array.isArray(interactions) ? interactions : [];
      const apiOnly = all.filter(i => i && i.role === 'assistant' && i.model);
      const max = 50;
      const view = apiOnly.slice(0, max);
      const sel = Math.min(Math.max(0, Number(selectedApiIndexBySession.get(key) || 0)), Math.max(0, view.length - 1));
      const selected = view[sel] || null;

      const listHtml = view.length ? view.map((i, idx) => {
        let snippet = i.textPreview || extractTextFromFullContent(i.fullContent) || i.content || '';
        snippet = String(snippet || '').replace(/\s+/g,' ').trim();
        if (snippet.length > 120) snippet = snippet.slice(0, 120) + '…';
        const tokenCtx = i.usage ? (i.usage.input||0) + (i.usage.cacheRead||0) + (i.usage.cacheWrite||0) : 0;
        const tokenOut = i.usage?.output || 0;
        const tokens = i.usage ? `${fmtCompact(tokenCtx)}→${fmtCompact(tokenOut)}` : '-';
        const tokensTitle = i.usage ? `in:${(i.usage.input||0).toLocaleString()} cR:${(i.usage.cacheRead||0).toLocaleString()} cW:${(i.usage.cacheWrite||0).toLocaleString()} out:${tokenOut.toLocaleString()}` : '';
        const fam = modelFamily(i.model || '');
        const modelRaw = i.model || '';
        const modelName = modelRaw ? modelRaw.split('/').pop() : '-';
        const modelTag = modelRaw ? `<span class="tag tag-${fam}" title="${escHtml(modelRaw)}">${escHtml(modelName)}</span>` : '-';
        return `
          <div class="list-row ${idx===sel?'selected':''}" onclick="selectApi('${key}', ${idx})">
            <div class="cell-time">${fmtTimeHms(i.ts)}</div>
            <div class="cell-type"><span class="badge">Bot</span>${modelTag}</div>
            <div class="cell-tokens" title="${escHtml(tokensTitle)}">${tokens}</div>
            <div class="cell-snippet" title="${escHtml(snippet)}">${escHtml(snippet || '-')}</div>
          </div>
        `;
      }).join('') : `<div class="mono" style="padding:10px">暂无 API 调用</div>`;

      let detailHtml = '<div class="mono">暂无详情</div>';
      if (selected) {
        const fam = modelFamily(selected.model || '');
        const modelRaw = selected.model || '';
        const modelName = modelRaw ? modelRaw.split('/').pop() : '-';
        const modelTag = modelRaw ? `<span class="tag tag-${fam}" title="${escHtml(modelRaw)}">${escHtml(modelName)}</span>` : '';

        const tokenIn = selected.usage?.input || 0;
        const tokenOut = selected.usage?.output || 0;
        const tokenCacheR = selected.usage?.cacheRead || 0;
        const tokenCacheW = selected.usage?.cacheWrite || 0;
        const tokenCtx = tokenIn + tokenCacheR + tokenCacheW;
        const tokens = selected.usage ? `ctx ${tokenCtx.toLocaleString()} → out ${tokenOut.toLocaleString()}` : '-';
        const provider = selected.provider || '';
        const stop = selected.stopReason ? `Stop: ${selected.stopReason}` : '';
        const err = selected.errorMessage ? `错误: ${selected.errorMessage}` : '';

        const inText = findNearestUserInput(all, selected.ts) || '';
        const inputBlock = inText
          ? `<div class="detail-box" style="color:#e6eef8;max-height:220px;overflow:auto">${escHtml(inText)}</div>`
          : `<div class="detail-box" style="color:#5c6b7f;font-style:italic;max-height:220px;overflow:auto">当前步骤没有消息</div>`;

        const outText = (buildAssistantOutputText(selected.fullContent, selected.textPreview) || '').trim();
        const outputBlock = outText
          ? `<div class="detail-box" style="color:#e6eef8;max-height:220px;overflow:auto">${escHtml(outText)}</div>`
          : `<div class="detail-box" style="color:#5c6b7f;font-style:italic;max-height:220px;overflow:auto">当前步骤没有消息</div>`;

        const costInfo = selected.usage?.cost ? (() => {
          const c = selected.usage.cost;
          const total = (c.input||0) + (c.output||0) + (c.cacheRead||0) + (c.cacheWrite||0);
          return total > 0 ? `$${total.toFixed(4)} (in:$${(c.input||0).toFixed(4)} out:$${(c.output||0).toFixed(4)})` : null;
        })() : null;
        const apiLabel = selected.api ? `<span class="badge">${escHtml(selected.api)}</span>` : '';
        detailHtml = `
          <div class="detail-title">
            <span class="badge">命令: Bot</span>
            ${provider ? `<span class="badge">${escHtml(provider)}</span>` : ''}
            ${modelTag}
            ${apiLabel}
          </div>
          <div class="detail-meta">
            <span>时间: ${escHtml(fmtTs(selected.ts))}</span>
            <span>${escHtml(tokens)}</span>
            ${(tokenCacheR > 0 || tokenCacheW > 0) ? `<span style="color:#7a90a8">缓存读/写: ${tokenCacheR.toLocaleString()}/${tokenCacheW.toLocaleString()}</span>` : ''}
            ${stop ? `<span>${escHtml(stop)}</span>` : ''}
            ${err ? `<span style="color:#ffb4b4">${escHtml(err)}</span>` : ''}
            ${costInfo ? `<span style="color:#a5d6a7">费用: ${escHtml(costInfo)}</span>` : ''}
          </div>
          <div class="row" style="gap:8px;margin-top:10px">
            <div class="badge">入参</div>
          </div>
          ${inputBlock}
          <div class="row" style="gap:8px;margin-top:10px">
            <div class="badge">返回参数</div>
          </div>
          ${outputBlock}
        `;
      }

      return `
        <div class="pane">
          <div class="pane-head">
            <div class="pane-title">API 调用</div>
            <div class="row" style="gap:8px">
              <div class="pane-sub">${escHtml(view.length ? `最近 ${view.length} 条` : '')}</div>
              <button class="btn-copy" onclick="copyApiDetail('${key}')">复制</button>
            </div>
          </div>
          <div class="pane-main">
            <div class="pane-list" data-scroll-id="api-list-${key}">${listHtml}</div>
            <div class="pane-detail" data-scroll-id="api-detail-${key}">${detailHtml}</div>
          </div>
        </div>
      `;
    }
    
    let _renderScheduled = false;
    function render(){
      if (_renderScheduled) return;
      _renderScheduled = true;
      requestAnimationFrame(() => {
        _renderScheduled = false;
        _doRender();
      });
    }
    function _doRender(){
      if (channelViewActive) {
        // 用户正在编辑备注时，跳过自动重渲（防止 input 失去焦点）
        if (editingNicknameKey) return;
        renderChannels();
        return;
      }
      const grid=document.getElementById('grid');
      // Save scroll positions before wiping DOM
      const scrollMap = new Map();
      grid.querySelectorAll('[data-scroll-id]').forEach(el => {
        scrollMap.set(el.dataset.scrollId, el.scrollTop);
      });
      grid.innerHTML='';
      const btnToggle = document.getElementById('btn-toggle-archived');
      if(btnToggle) btnToggle.textContent = showArchived ? '隐藏归档' : `显示归档 (${archived.size})`;
      const btnDeleted = document.getElementById('btn-toggle-deleted');
      if (btnDeleted) {
        const n = deletedCache && deletedCache.length ? deletedCache.length : 0;
        btnDeleted.textContent = `已删除 (${n})`;
      }

      const groups = new Map();
      for (const [key, s] of state.entries()) {
        const agentId = s.agentId || 'main';
        if (!groups.has(agentId)) groups.set(agentId, []);
        groups.get(agentId).push([key, s]);
      }
      const agentIds = [...groups.keys()].sort();
      const activeSet = expandedSessions.size ? new Set(expandedSessions) : null;
      if (!agentIds.length) {
        grid.innerHTML = '<div class="mono">暂无 session</div>';
        return;
      }
      agentIds.forEach((agentId) => {
        const allItems = groups.get(agentId) || [];
        const sorted = allItems.sort((a, b) => {
          const tsA = new Date(a[1].lastTs || 0).getTime();
          const tsB = new Date(b[1].lastTs || 0).getTime();
          if (tsB !== tsA) return tsB - tsA;
          return (b[1].bumpTs || 0) - (a[1].bumpTs || 0);
        });
        const items = sorted.filter(([key]) => showArchived ? true : !archived.has(key));
        const visibleItems = activeSet ? items.filter(([key]) => activeSet.has(key)) : items;
        const block = document.createElement('div');
        block.className = 'agent-block';
        const count = visibleItems.length;
        block.innerHTML = `
          <div class="agent-head">
            <div class="badge">Agent</div>
            <div class="mono">${escHtml(displayAgentName(agentId))}</div>
            <div class="badge">Sessions</div>
            <div class="mono">${count}</div>
          </div>
        `;
        const agentGrid = document.createElement('div');
        agentGrid.className = 'agent-grid';
        if (expandedSessions.size === 1) {
          agentGrid.style.gridTemplateColumns = 'minmax(0, 1fr)';
        } else {
          applyGridLayoutTo(agentGrid, Math.max(1, count));
        }
        visibleItems.forEach(([key, s], idx) => {
          const { sessionId } = parseKey(key);
          const isArchived = archived.has(key);
          const isPrimary = !isArchived && idx === 0;
          const now = Date.now();
          const isHighlight = s.updatedAt && (now - s.updatedAt < 3000);
          const isExpanded = expandedSessions.has(key);
          const isFullscreen = expandedSessions.size === 1 && isExpanded;
          const el = document.createElement('div');
          el.className = 'card' + (isPrimary ? ' primary' : '') + (isHighlight ? ' highlight' : '') + (isFullscreen ? ' fullscreen' : '');
          if (isArchived) el.style.opacity = '0.6';
          el.innerHTML = `
            <div class="row">
              <div class="badge">Session</div>
              <div class="mono">${escHtml(sessionId)}</div>
              <button class="btn-link" onclick="openHistory('${key}')">历史</button>
              <button class="btn-copy" onclick="copySessionDetail('${key}')">复制</button>
              <button class="btn-danger" onclick="softDeleteSession('${key}')">删除</button>
              <button class="btn-link" onclick="toggleDetails('${key}')">${isExpanded ? '取消激活' : '激活'}</button>
              <button class="btn-archive" onclick="toggleArchive('${key}')">${isArchived ? '取消归档' : '归档'}</button>
            </div>
            <div class="row" style="margin-top:6px">
              <div class="badge">${escHtml(s.role||'n/a')}</div>
              <div class="badge">${escHtml(s.provider||'provider')}</div>
              <div class="badge">${escHtml(s.model||'model')}</div>
              <div class="badge" title="Total Tokens: ${(s.totalTokens?.input||0).toLocaleString()}/${(s.totalTokens?.output||0).toLocaleString()}">${fmtCompact((s.totalTokens?.input||0) + (s.totalTokens?.output||0))} (${fmtCompact(s.totalTokens?.input||0)}/${fmtCompact(s.totalTokens?.output||0)})</div>
              <div class="ts">${fmtTs(s.ts)}</div>
            </div>
            <div class="row" style="margin-top:6px">
              <div class="badge">最近一步</div>
              <div class="title">${escHtml(getCurrentStepLabel(s))}</div>
            </div>
            ${s.toolArgs ? `<div class="mono" style="margin-top:6px;max-height:100px;overflow:auto">${JSON.stringify(s.toolArgs)}</div>` : ''}
            ${s.errorMessage ? `<div class="mono" style="margin-top:6px;color:#ffb4b4;max-height:100px;overflow:auto">错误: ${s.errorMessage}</div>` : ''}
            <div class="card-body">
              ${renderStepPane(key, s.interactions || [], isFullscreen)}
              ${renderApiPane(key, s.interactions || [], isFullscreen)}
            </div>
          `;
          agentGrid.appendChild(el);
        });
        block.appendChild(agentGrid);
        grid.appendChild(block);
      });
      // Restore scroll positions after rebuild
      grid.querySelectorAll('[data-scroll-id]').forEach(el => {
        const saved = scrollMap.get(el.dataset.scrollId);
        if (saved !== undefined) el.scrollTop = saved;
      });
    }
    async function loadNicknames() {
      try {
        const r = await fetch('/api/channel-nicknames', { cache: 'no-store' });
        if (r.ok) channelNicknames = await r.json();
      } catch {}
    }

    function nicknameKey(channel, chatType, senderId) {
      return `${channel}:${chatType}:${senderId}`;
    }

    function getNickname(channel, chatType, senderId) {
      return channelNicknames[nicknameKey(channel, chatType, senderId)] || null;
    }

    async function saveNickname(channel, chatType, senderId, nickname) {
      const key = nicknameKey(channel, chatType, senderId);
      try {
        const r = await fetch('/api/channel-nicknames', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, nickname }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || r.statusText);
        channelNicknames = j.nicknames;
        editingNicknameKey = null;
        render();
      } catch (e) {
        alert(`保存失败：${String(e && e.message || e)}`);
      }
    }

    function startEditNickname(channel, chatType, senderId) {
      editingNicknameKey = nicknameKey(channel, chatType, senderId);
      renderChannels(); // 直接调 renderChannels，绕过 editingNicknameKey 的 guard
      // Focus the input after render
      requestAnimationFrame(() => {
        const el = document.getElementById('active-nickname-input');
        if (el) { el.focus(); el.select(); }
      });
    }

    function cancelEditNickname() {
      editingNicknameKey = null;
      render();
    }

    function toggleChannelView() {
      channelViewActive = !channelViewActive;
      const btn = document.getElementById('btn-channel-view');
      if (btn) btn.textContent = channelViewActive ? '会话视图' : '频道视图';
      render();
    }

    async function pollChannels() {
      try {
        const r = await fetch('/api/channels', { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        if (Array.isArray(j.channels)) channelData = j.channels;
        if (channelViewActive && !editingNicknameKey) render();
      } catch {}
    }

    function channelIcon(channel) {
      const c = String(channel || '').toLowerCase();
      if (c === 'feishu' || c === 'lark') return '🪶';
      if (c === 'telegram') return '✈';
      if (c === 'slack') return '💬';
      if (c === 'discord') return '🎮';
      if (c === 'wechat') return '💚';
      if (c === 'heartbeat') return '💓';
      return '📡';
    }

    function renderChannels() {
      const grid = document.getElementById('grid');
      // Save scroll
      const scrollMap = new Map();
      grid.querySelectorAll('[data-scroll-id]').forEach(el => scrollMap.set(el.dataset.scrollId, el.scrollTop));
      grid.innerHTML = '';

      if (!channelData.length) {
        grid.innerHTML = '<div class="mono" style="padding:20px">暂无频道数据，等待 sessions.json 加载…</div>';
        return;
      }

      // 按 agentId → channel 分组
      const byAgent = new Map();
      for (const entry of channelData) {
        const aid = entry.agentId || 'main';
        if (!byAgent.has(aid)) byAgent.set(aid, new Map());
        const byChannel = byAgent.get(aid);
        const ch = entry.channel || 'unknown';
        if (!byChannel.has(ch)) byChannel.set(ch, []);
        byChannel.get(ch).push(entry);
      }

      for (const [agentId, byChannel] of byAgent) {
        const agentBlock = document.createElement('div');
        agentBlock.className = 'agent-block';
        agentBlock.innerHTML = `
          <div class="agent-head">
            <div class="badge">Agent</div>
            <div class="mono">${escHtml(agentId)}</div>
            <div class="badge">频道数</div>
            <div class="mono">${byChannel.size}</div>
          </div>
        `;

        for (const [channel, entries] of byChannel) {
          const icon = channelIcon(channel);
          const chBlock = document.createElement('div');
          chBlock.style.cssText = 'border:1px solid #1c2834;border-radius:8px;background:#0b0f14;padding:10px;margin-top:8px';

          const chHead = document.createElement('div');
          chHead.className = 'row';
          chHead.style.cssText = 'gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1c2834';
          chHead.innerHTML = `
            <span style="font-size:16px">${escHtml(icon)}</span>
            <span class="title">${escHtml(channel)}</span>
            <span class="badge">${entries.length} 个对话者</span>
          `;
          chBlock.appendChild(chHead);

          // 每个 sender 一行
          for (const entry of entries) {
            const { sessionId, chatType, senderId, senderLabel, accountId, updatedAt, sessionKey } = entry;
            // 从 state 取实时数据
            const stateKey = makeKey(agentId, sessionId || '');
            const live = sessionId ? state.get(stateKey) : null;
            const lastTs = live ? (live.lastTs || updatedAt) : updatedAt;
            const lastMsg = live ? (
              live.textPreview
                ? String(live.textPreview).replace(/\s+/g, ' ').trim().slice(0, 80)
                : (live.toolName ? `工具: ${live.toolName}` : '')
            ) : '';
            const tokens = live?.totalTokens ? fmtCompact((live.totalTokens.input||0)+(live.totalTokens.output||0)) : '-';
            const isActive = live && live.updatedAt && (Date.now() - live.updatedAt < 8000);
            const activeDot = isActive ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#35c46a;margin-right:6px"></span>' : '';

            // chatType badge 颜色
            const chatTypeBadge = chatType === 'direct'
              ? `<span class="badge" style="border-color:#234a86;background:rgba(58,120,255,.12);color:#a9c7ff">${escHtml(chatType)}</span>`
              : `<span class="badge" style="border-color:#3a5a3a;background:rgba(76,175,80,.12);color:#a5d6a7">${escHtml(chatType)}</span>`;

            const nickname = getNickname(channel, chatType, senderId);
            const nkKey = nicknameKey(channel, chatType, senderId);
            const isEditingNk = editingNicknameKey === nkKey;
            const displayName = nickname || senderLabel || senderId;
            const rawId = senderLabel || senderId;

            let senderCell;
            if (isEditingNk) {
              senderCell = `
                <div class="row" style="gap:4px;min-width:0;flex-wrap:nowrap">
                  ${activeDot}
                  <input id="active-nickname-input"
                    type="text"
                    value="${escHtml(nickname || '')}"
                    placeholder="${escHtml(rawId)}"
                    style="flex:1;min-width:0;background:#0b0f14;border:1px solid #3a78ff;color:#e6eef8;border-radius:4px;padding:2px 6px;font-size:12px;font-family:inherit"
                    onkeydown="if(event.key==='Enter'){saveNickname('${escHtml(channel)}','${escHtml(chatType)}','${escHtml(senderId)}',this.value)}else if(event.key==='Escape'){cancelEditNickname()}"
                  />
                  <button class="btn-link" style="padding:2px 6px" onclick="saveNickname('${escHtml(channel)}','${escHtml(chatType)}','${escHtml(senderId)}',document.getElementById('active-nickname-input').value)">✓</button>
                  <button class="btn-archive" style="padding:2px 6px" onclick="cancelEditNickname()">✕</button>
                </div>`;
            } else {
              senderCell = `
                <div class="row" style="gap:6px;min-width:0;flex-wrap:nowrap">
                  ${activeDot}
                  <span class="mono" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${nickname ? 'color:#cfe3ff;font-weight:600' : ''}" title="${escHtml(rawId)}">${escHtml(displayName)}</span>
                  ${nickname ? `<span class="mono" style="color:#5c6b7f;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(rawId)}">${escHtml(rawId.length > 12 ? rawId.slice(0,12)+'…' : rawId)}</span>` : ''}
                  <button class="btn-archive" style="padding:1px 5px;font-size:11px;flex-shrink:0" title="编辑备注" onclick="startEditNickname('${escHtml(channel)}','${escHtml(chatType)}','${escHtml(senderId)}')">✏</button>
                </div>`;
            }

            const row = document.createElement('div');
            row.style.cssText = 'display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr) minmax(0,3fr) minmax(0,1fr) auto;gap:10px;align-items:center;padding:8px 6px;border-bottom:1px dashed #1c2834;font-size:12px';
            row.innerHTML = `
              ${senderCell}
              <div class="row" style="gap:6px">
                ${chatTypeBadge}
                ${accountId && accountId !== 'default' ? `<span class="badge">${escHtml(accountId)}</span>` : ''}
              </div>
              <div class="cell-snippet" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(lastMsg)}">${escHtml(lastMsg || '—')}</div>
              <div class="row" style="gap:6px">
                <span class="badge" title="总 token">${tokens}</span>
                <span class="ts">${lastTs ? fmtTs(lastTs) : '-'}</span>
              </div>
              <div class="row" style="gap:6px">
                ${sessionId ? `<button class="btn-link" onclick="location.href='/activity?agent=${encodeURIComponent(agentId)}&sid=${encodeURIComponent(sessionId)}'">历史</button>` : ''}
                ${sessionId ? `<button class="btn-copy" onclick="copySessionDetail('${escHtml(makeKey(agentId, sessionId))}')">复制</button>` : ''}
              </div>
            `;
            chBlock.appendChild(row);
          }
          agentBlock.appendChild(chBlock);
        }
        grid.appendChild(agentBlock);
      }

      // Restore scroll
      grid.querySelectorAll('[data-scroll-id]').forEach(el => {
        const saved = scrollMap.get(el.dataset.scrollId);
        if (saved !== undefined) el.scrollTop = saved;
      });
    }

    async function pollSnapshot(){
      try{
        const r=await fetch('/snapshot',{cache:'no-store'});
        if(!r.ok) return;
        const j=await r.json();
        if(Array.isArray(j.items)){
          const now=Date.now();
          for(const e of j.items){
            upsert(e, true);
          }
          
          // Handle server-side stats if available
          if (j.stats) {
            let changed = false;
            for (const [agentId, sessions] of Object.entries(j.stats)) {
              for (const [sid, stat] of Object.entries(sessions || {})) {
                const key = makeKey(agentId, sid);
                const s = state.get(key);
                if (s) {
                  state.set(key, { ...s, serverTotalTokens: stat, totalTokens: stat });
                  changed = true;
                }
              }
            }
            if (changed) render();
          }
          
          if (j.activeByAgent) {
            const activeSet = new Set();
            for (const [agentId, sessions] of Object.entries(j.activeByAgent)) {
              for (const sid of sessions || []) {
                activeSet.add(makeKey(agentId, sid));
              }
            }
            let pruned = false;
            for (const key of [...state.keys()]) {
              if (!activeSet.has(key)) {
                state.delete(key);
                archived.delete(key);
                expandedSessions.delete(key);
                pruned = true;
              }
            }
            if (pruned) {
              saveArchived();
              render();
            }
          }
        }
      }catch{}
    }
    window.addEventListener('DOMContentLoaded',()=>{
      // 立即拉取一次快照，保证首次加载有数据
      pollSnapshot();
      setInterval(pollSnapshot, 15000);
      // 频道数据 + 备注轮询
      pollChannels();
      setInterval(pollChannels, 5000);
      loadNicknames();
      refreshDeletedList(true).then(() => render());
      setInterval(() => refreshDeletedList(false).then(() => render()), 5000);
      // 同时尝试建立 SSE（若不可用则忽略，由快照兜底）
      const es=new EventSource('/events');
      es.onmessage=(ev)=>{try{const e=JSON.parse(ev.data);if(e.type==='llm-capture'){handleLlmCaptureEvent(e)}else{upsert(e, false)}}catch{}};
      es.onerror=()=>{};

      window.addEventListener('resize', ()=>render());
    });
  </script>
</head>
<body>
  <header>
    <div class="header-row">
          <h1>Agent → Session 实时监控</h1>
      <div class="row">
        <a href="/heartbeat.html" class="toggle-archived" style="text-decoration:none">Heartbeat Scheduler</a>
        <button class="toggle-archived" onclick="location.href='/activity'">详细时间轴 (Activity)</button>
        <button id="btn-channel-view" class="toggle-archived" onclick="toggleChannelView()">频道视图</button>
        <button class="toggle-archived" onclick="openAutoDeleteSettings()">自动软删设置</button>
        <button class="toggle-archived" onclick="toggleLlmCapturesPanel()" style="border-color:#5e2a86;color:#e1bee7">LLM Requests</button>
        <button id="btn-toggle-deleted" class="toggle-archived" onclick="toggleDeletedPanel()">已删除</button>
        <button id="btn-toggle-archived" class="toggle-archived" onclick="toggleShowArchived()">显示归档</button>
      </div>
    </div>
  </header>
  <div id="settings-overlay" class="overlay" onclick="if(event.target===this)closeAutoDeleteSettings()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-body" id="settings-box"></div>
    </div>
  </div>
  <div id="deleted-overlay" class="overlay" onclick="if(event.target===this)toggleDeletedPanel()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-head">
        <div class="row" style="gap:10px">
          <div class="badge">已删除</div>
          <div class="mono">软删：可随时恢复</div>
        </div>
        <div class="row">
          <button class="toggle-archived" onclick="refreshDeletedList(true).then(() => renderDeletedPanel())">刷新</button>
          <button class="toggle-archived" onclick="toggleDeletedPanel()">关闭</button>
        </div>
      </div>
      <div id="deleted-list" class="panel-body"></div>
    </div>
  </div>
  <div id="llm-captures-overlay" class="overlay" onclick="if(event.target===this)toggleLlmCapturesPanel()" style="display:none">
    <div class="panel" style="width:min(1200px,95%);max-height:90vh;display:flex;flex-direction:column" onclick="event.stopPropagation()">
      <div class="panel-head">
        <div class="row" style="gap:10px">
          <div class="badge" style="border-color:#5e2a86;color:#e1bee7">LLM Requests</div>
          <div class="mono">mitmproxy 捕获的完整 API 请求/响应</div>
        </div>
        <div class="row" style="gap:6px">
          <button class="toggle-archived" onclick="pollLlmCaptures().then(()=>renderLlmCapturesPanel())">刷新</button>
          <button class="toggle-archived" onclick="toggleLlmCapturesPanel()">关闭</button>
        </div>
      </div>
      <div style="flex:1;min-height:0;display:grid;grid-template-columns:320px 1fr;overflow:hidden">
        <div id="llm-captures-list" style="overflow:auto;border-right:1px solid #1c2834;padding:4px 0"></div>
        <div id="llm-captures-detail" style="overflow:auto;padding:12px">
          <div class="mono">点击左侧列表查看详情</div>
        </div>
      </div>
    </div>
  </div>
  <div id="grid"></div>
</body>
</html>
