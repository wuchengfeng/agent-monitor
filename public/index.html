    function renderTopoAgentPanel(panel) {
      if (!topologyData || !topoSelectedNode) return;
      let agentId = null;
      if (topoSelectedNode.type === 'agent') {
        agentId = topoSelectedNode.id.replace('agent:', '');
      } else {
        const sess = topologyData.sessions.find(s => `session:${s.id}` === topoSelectedNode.id);
        if (sess) agentId = sess.agentId;
      }
      if (!agentId) { panel.innerHTML = '<div class="mono" style="padding:20px">未找到 Agent</div>'; return; }

      const ag = topologyData.agents.find(a => a.id === agentId);
      const agSessions = topologyData.sessions.filter(s => s.agentId === agentId);
      const agEdges = topologyData.edges.filter(e => e.sourceAgent === agentId || e.targetAgent === agentId);
      const sendOut = agEdges.filter(e => e.sourceAgent === agentId && (e.type === 'send'));
      const sendIn = agEdges.filter(e => e.targetAgent === agentId && (e.type === 'send-incoming'));
      const spawns = agEdges.filter(e => e.sourceAgent === agentId && (e.type === 'spawn'));
      const c = agentColor(agentId);

      let html = `<div class="topo-section">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div class="badge ${agentTagClass(agentId).replace('agent-tag ','')} agent-tag" style="font-size:14px;padding:4px 10px">${agentId}</div>
          <div class="badge" style="border-color:${ag && ag.status === 'active' ? '#4caf50' : '#555'};color:${ag && ag.status === 'active' ? '#a5d6a7' : '#888'}">${ag ? ag.status : 'unknown'}</div>
        </div>
      </div>`;

      html += `<div class="topo-section"><div class="topo-section-title">概览</div><div class="topo-kv">`;
      html += `<div class="topo-kv-label">Sessions</div><div class="topo-kv-value">${ag ? ag.activeSessionCount : 0} active / ${ag ? ag.sessionCount : 0} total</div>`;
      if (ag && ag.totalTokens) {
        const total = ag.totalTokens.input + ag.totalTokens.output;
        html += `<div class="topo-kv-label">Tokens</div><div class="topo-kv-value">${formatCompactTokens(ag.totalTokens.input)} in / ${formatCompactTokens(ag.totalTokens.output)} out (${formatCompactTokens(total)} total)</div>`;
      }
      html += `<div class="topo-kv-label">Send 发出</div><div class="topo-kv-value">${sendOut.length}</div>`;
      html += `<div class="topo-kv-label">Send 收到</div><div class="topo-kv-value">${sendIn.length}</div>`;
      html += `<div class="topo-kv-label">Spawn</div><div class="topo-kv-value">${spawns.length}</div>`;
      html += `</div></div>`;

      // Channels
      const channels = [...new Set(agSessions.map(s => s.channel))];
      html += `<div class="topo-section"><div class="topo-section-title">频道</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;
      for (const ch of channels) {
        html += `<div class="badge" style="border-color:${sessionNodeColor(ch)};color:${sessionNodeColor(ch)}">${ch}</div>`;
      }
      html += `</div></div>`;

      // Session list
      html += `<div class="topo-section"><div class="topo-section-title">Sessions (${agSessions.length})</div><div class="topo-session-list">`;
      const sortedSess = [...agSessions].sort((a, b) => (b.isActive ? 1 : 0) - (a.isActive ? 1 : 0));
      for (const sess of sortedSess.slice(0, 30)) {
        const isSelected = topoSelectedNode && topoSelectedNode.id === `session:${sess.id}`;
        html += `<div class="topo-session-row ${isSelected ? 'active' : ''}" onclick="topoSelectedNode={type:'session',id:'session:${sess.id}'};topoSidePanelTab='session';document.querySelectorAll('.topo-tab').forEach((t,i)=>t.classList.toggle('active',i===1));renderTopoSidePanel();">
          <div class="topo-dot" style="background:${sess.isActive ? sessionNodeColor(sess.channel) : '#333'}"></div>
          <span style="color:#7aa2d5">${sess.channel}</span>
          <span style="color:#555;font-size:10px;margin-left:auto">${sess.id.slice(0,8)}</span>
          ${sess.isActive ? '<span style="color:#4caf50;font-size:10px">active</span>' : '<span style="color:#555;font-size:10px">idle</span>'}
        </div>`;
      }
      if (sortedSess.length > 30) html += `<div class="mono" style="padding:4px 8px">...${sortedSess.length - 30} more</div>`;
      html += `</div></div>`;

      // Edge history
      if (agEdges.length) {
        html += `<div class="topo-section"><div class="topo-section-title">连接关系 (${agEdges.length})</div><div class="topo-edge-list">`;
        for (const e of agEdges.slice(-15)) {
          const dir = e.sourceAgent === agentId ? '→' : '←';
          const other = e.sourceAgent === agentId ? (e.targetAgent || '?') : (e.sourceAgent || '?');
          const typeLabel = e.type === 'spawn' ? '🔀 spawn' : e.type === 'spawn-result' ? '📨 result' : e.type === 'send-incoming' ? '📩 recv' : '📤 send';
          const status = e.meta && e.meta.status ? ` [${e.meta.status}]` : '';
          html += `<div class="topo-edge-row">${typeLabel} ${dir} <span style="color:${agentColor(other).text}">${other}</span>${status}</div>`;
        }
        html += `</div></div>`;
      }

      panel.innerHTML = html;
    }

    function renderTopoSessionPanel(panel) {
      if (!topologyData || !topoSelectedNode) return;
      let sessData = null;
      if (topoSelectedNode.type === 'session') {
        const sid = topoSelectedNode.id.replace('session:', '');
        sessData = topologyData.sessions.find(s => s.id === sid);
      } else if (topoSelectedNode.type === 'agent') {
        // Show first active session of this agent
        const agentId = topoSelectedNode.id.replace('agent:', '');
        sessData = topologyData.sessions.find(s => s.agentId === agentId && s.isActive);
      }
      if (!sessData) { panel.innerHTML = '<div class="mono" style="padding:20px;color:#7aa2d5">未选择 Session</div>'; return; }

      const stateKey = makeKey(sessData.agentId, sessData.id);
      const liveState = state.get(stateKey) || {};
      const interactions = liveState.interactions || [];
      const lastInteraction = interactions.length ? interactions[interactions.length - 1] : null;
      const sesEdges = topologyData.edges.filter(e =>
        e.sourceSession === sessData.id || e.targetSession === sessData.id ||
        e.targetSessionKey === sessData.key || e.sourceSessionKey === sessData.key
      );

      let html = `<div class="topo-section">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <div class="badge ${agentTagClass(sessData.agentId).replace('agent-tag ','')} agent-tag">${sessData.agentId}</div>
          <div class="badge" style="border-color:${sessionNodeColor(sessData.channel)};color:${sessionNodeColor(sessData.channel)}">${sessData.channel}</div>
          ${sessData.isActive ? '<div class="badge" style="border-color:#4caf50;color:#a5d6a7">active</div>' : '<div class="badge" style="border-color:#555;color:#888">idle</div>'}
          ${sessData.isSubagent ? '<div class="badge" style="border-color:#9c27b0;color:#e1bee7">subagent</div>' : ''}
        </div>
        <div class="mono" style="font-size:11px;color:#546e7a">${sessData.id}</div>
        ${sessData.key ? `<div class="mono" style="font-size:10px;color:#455a64;margin-top:2px">${sessData.key}</div>` : ''}
      </div>`;

      // Stats
      html += `<div class="topo-section"><div class="topo-section-title">统计</div><div class="topo-kv">`;
      html += `<div class="topo-kv-label">Tokens In</div><div class="topo-kv-value">${formatCompactTokens(sessData.tokens.input)}</div>`;
      html += `<div class="topo-kv-label">Tokens Out</div><div class="topo-kv-value">${formatCompactTokens(sessData.tokens.output)}</div>`;
      html += `<div class="topo-kv-label">Total</div><div class="topo-kv-value">${formatCompactTokens(sessData.tokens.input + sessData.tokens.output)}</div>`;
      if (liveState.model) html += `<div class="topo-kv-label">Model</div><div class="topo-kv-value">${liveState.model}</div>`;
      if (liveState.provider) html += `<div class="topo-kv-label">Provider</div><div class="topo-kv-value">${liveState.provider}</div>`;
      html += `<div class="topo-kv-label">Messages</div><div class="topo-kv-value">${interactions.length}</div>`;
      html += `</div></div>`;

      // Latest activity
      if (interactions.length) {
        html += `<div class="topo-section"><div class="topo-section-title">最近活动 (${Math.min(interactions.length, 10)})</div>`;
        const recent = interactions.slice(-10);
        for (const it of recent) {
          const typeColors = { User: '#4caf50', Bot: '#3a78ff', ToolCall: '#ff9800', ToolResult: '#26a69a', Error: '#f44336', System: '#546e7a' };
          const color = typeColors[it.type] || '#7aa2d5';
          const text = String(it.content || '').slice(0, 100);
          html += `<div style="padding:4px 0;border-bottom:1px dashed #1c2834;font-size:11px">
            <span style="color:${color};font-weight:600;margin-right:6px">${it.type}</span>
            <span style="color:#5c6b7f;font-size:10px">${fmtTimeHms(it.ts)}</span>
            <div style="color:#a8b3bf;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(text)}</div>
          </div>`;
        }
        html += `</div>`;
      }

      // Relationships
      if (sesEdges.length) {
        html += `<div class="topo-section"><div class="topo-section-title">连接关系</div><div class="topo-edge-list">`;
        for (const e of sesEdges) {
          const typeLabel = e.type === 'spawn' ? '🔀 spawn' : e.type === 'spawn-result' ? '📨 result' : e.type === 'send-incoming' ? '📩 recv' : '📤 send';
          const other = e.sourceSession === sessData.id ? (e.targetAgent || '?') : (e.sourceAgent || '?');
          const status = e.meta && e.meta.status ? ` [${e.meta.status}]` : '';
          const preview = e.meta && e.meta.messagePreview ? `<div style="color:#546e7a;margin-top:2px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(e.meta.messagePreview)}</div>` : '';
          const task = e.meta && e.meta.taskPreview ? `<div style="color:#546e7a;margin-top:2px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(e.meta.taskPreview)}</div>` : '';
          html += `<div class="topo-edge-row">${typeLabel} → <span style="color:${agentColor(other).text}">${other}</span>${status}${preview}${task}</div>`;
        }
        html += `</div></div>`;
      }

      // Link to activity timeline
      html += `<div class="topo-section"><a href="/activity?sid=${sessData.id}&agent=${sessData.agentId}" class="toggle-archived" style="text-decoration:none;display:inline-block">查看完整时间轴 →</a></div>`;

      panel.innerHTML = html;
    }

    function toggleChannelView() {
      channelViewActive = !channelViewActive;
      if (channelViewActive) { topologyViewActive = false; updateTopoToggleBtn(); stopTopoLoop(); }
      const btn = document.getElementById('btn-channel-view');
      if (btn) btn.textContent = channelViewActive ? '会话视图' : '频道视图';
      render();
    }

    function toggleTopologyView() {
      topologyViewActive = !topologyViewActive;
      if (topologyViewActive) { channelViewActive = false; const cb = document.getElementById('btn-channel-view'); if (cb) cb.textContent = '频道视图'; }
      updateTopoToggleBtn();
      if (topologyViewActive) { startTopoLoop(); pollTopology(); }
      else { stopTopoLoop(); }
      render();
    }
    function updateTopoToggleBtn() {
      const btn = document.getElementById('btn-topology-view');
      if (btn) btn.textContent = topologyViewActive ? '会话视图' : '拓扑视图';
    }
    function startTopoLoop() {
      stopTopoLoop();
      topoPollingInterval = setInterval(pollTopology, 10000);
      startTopoAnimation();
    }
    function stopTopoLoop() {
      if (topoPollingInterval) { clearInterval(topoPollingInterval); topoPollingInterval = null; }
      if (topoAnimFrame) { cancelAnimationFrame(topoAnimFrame); topoAnimFrame = null; }
    }

    async function pollChannels() {
      try {
        const r = await fetch('/api/channels', { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        if (Array.isArray(j.channels)) channelData = j.channels;
        if (channelViewActive && !editingNicknameKey) render();
      } catch {}
    }

    function channelIcon(channel) {
      const c = String(channel || '').toLowerCase();
      if (c === 'yach') return '🔵';
      if (c === 'feishu' || c === 'lark') return '🪶';
      if (c === 'telegram') return '✈';
      if (c === 'slack') return '💬';
      if (c === 'discord') return '🎮';
      if (c === 'wechat') return '💚';
      if (c === 'heartbeat') return '💓';
      if (c === 'openai') return '🤖';
      if (c === 'webchat') return '🌐';
      return '📡';
    }

    let systemChannelsExpanded = false;

    function isSystemChannel(entry) {
      const ch = (entry.channel || '').toLowerCase();
      if (ch === 'heartbeat') return true;
      if (ch === 'openai' && (entry.senderId === 'unknown' || entry.chatType === 'unknown')) return true;
      if (ch === 'webchat' && (entry.senderId === 'unknown' || entry.chatType === 'unknown')) return true;
      return false;
    }

    function agentTagClass(agentId) {
      const id = (agentId || '').toLowerCase();
      if (id === 'main') return 'agent-tag agent-tag-main';
      if (id === 'nanbosirui') return 'agent-tag agent-tag-nanbosirui';
      if (id === 'nanbosuikesi') return 'agent-tag agent-tag-nanbosuikesi';
      return 'agent-tag agent-tag-default';
    }

    function renderChannelRow(entry, container) {
      const { agentId, sessionId, channel, chatType, senderId, senderLabel, accountId, updatedAt } = entry;
      const icon = channelIcon(channel);
      const stateKey = makeKey(agentId, sessionId || '');
      const live = sessionId ? state.get(stateKey) : null;
      const lastTs = live ? (live.lastTs || updatedAt) : updatedAt;
      const lastMsg = live ? (
        live.textPreview
          ? String(live.textPreview).replace(/\s+/g, ' ').trim().slice(0, 80)
          : (live.toolName ? `工具: ${live.toolName}` : '')
      ) : '';
      const tokens = live?.totalTokens ? fmtCompact((live.totalTokens.input||0)+(live.totalTokens.output||0)) : '-';
      const isActive = live && live.updatedAt && (Date.now() - live.updatedAt < 8000);
      const activeDot = isActive ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#35c46a;margin-right:4px;flex-shrink:0"></span>' : '';

      const chatTypeBadge = chatType === 'direct'
        ? `<span class="badge" style="border-color:#234a86;background:rgba(58,120,255,.12);color:#a9c7ff">私聊</span>`
        : chatType === 'group'
          ? `<span class="badge" style="border-color:#3a5a3a;background:rgba(76,175,80,.12);color:#a5d6a7">群聊</span>`
          : `<span class="badge">${escHtml(chatType)}</span>`;

      const nickname = getNickname(channel, chatType, senderId);
      const nkKey = nicknameKey(channel, chatType, senderId);
      const isEditingNk = editingNicknameKey === nkKey;
      const displayName = nickname || senderLabel || senderId;
      const rawId = senderLabel || senderId;

      let nameCell;
      if (isEditingNk) {
        nameCell = `
          <div class="row" style="gap:4px;min-width:0;flex-wrap:nowrap">
            ${activeDot}
            <input id="active-nickname-input" type="text" value="${escHtml(nickname || '')}" placeholder="${escHtml(rawId)}"
              style="flex:1;min-width:0;background:#0b0f14;border:1px solid #3a78ff;color:#e6eef8;border-radius:4px;padding:2px 6px;font-size:12px;font-family:inherit"
              onkeydown="if(event.key==='Enter'){saveNickname('${escHtml(channel)}','${escHtml(chatType)}','${escHtml(senderId)}',this.value)}else if(event.key==='Escape'){cancelEditNickname()}" />
            <button class="btn-link" style="padding:2px 6px" onclick="saveNickname('${escHtml(channel)}','${escHtml(chatType)}','${escHtml(senderId)}',document.getElementById('active-nickname-input').value)">✓</button>
            <button class="btn-archive" style="padding:2px 6px" onclick="cancelEditNickname()">✕</button>
          </div>`;
      } else {
        nameCell = `
          <div class="row" style="gap:5px;min-width:0;flex-wrap:nowrap">
            ${activeDot}
            <span class="mono" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${nickname ? 'color:#cfe3ff;font-weight:600' : ''}" title="${escHtml(rawId)}">${escHtml(displayName)}</span>
            ${nickname ? `<span class="mono" style="color:#5c6b7f;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(rawId)}">${escHtml(rawId.length > 12 ? rawId.slice(0,12)+'…' : rawId)}</span>` : ''}
            <button class="btn-archive" style="padding:1px 5px;font-size:11px;flex-shrink:0" title="编辑备注" onclick="startEditNickname('${escHtml(channel)}','${escHtml(chatType)}','${escHtml(senderId)}')">✏</button>
          </div>`;
      }

      const row = document.createElement('div');
      row.className = 'ch-row';
      row.innerHTML = `
        <span style="font-size:15px;text-align:center">${icon}</span>
        ${nameCell}
        <div class="row" style="gap:5px;flex-wrap:nowrap">
          <span class="${agentTagClass(agentId)}">${escHtml(agentId)}</span>
          ${chatTypeBadge}
        </div>
        <span class="badge" title="总 token" style="justify-self:center">${tokens}</span>
        <div class="cell-snippet" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(lastMsg)}">${escHtml(lastMsg || '—')}</div>
        <span class="ts" style="white-space:nowrap">${lastTs ? fmtTs(lastTs) : '-'}</span>
        <div class="row" style="gap:5px;flex-wrap:nowrap">
          ${sessionId ? `<button class="btn-link" onclick="location.href='/activity?agent=${encodeURIComponent(agentId)}&sid=${encodeURIComponent(sessionId)}'">历史</button>` : ''}
          ${sessionId ? `<button class="btn-copy" onclick="copySessionDetail('${escHtml(makeKey(agentId, sessionId))}')">复制</button>` : ''}
        </div>
      `;
      container.appendChild(row);
    }

    function renderChannels() {
      const grid = document.getElementById('grid');
      const prevScroll = grid.scrollTop;
      grid.innerHTML = '';

      if (!channelData.length) {
        grid.innerHTML = '<div class="mono" style="padding:20px">暂无频道数据，等待 sessions.json 加载…</div>';
        return;
      }

      // 分组 + 按时间降序
      const sorted = [...channelData].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      const normal = sorted.filter(e => !isSystemChannel(e));
      const system = sorted.filter(e => isSystemChannel(e));

      // 正常频道 — 扁平列表
      const normalBlock = document.createElement('div');
      normalBlock.style.cssText = 'border:1px solid #1c2834;border-radius:10px;background:#0e1621;overflow:hidden';
      for (const entry of normal) {
        renderChannelRow(entry, normalBlock);
      }
      if (normal.length === 0) {
        normalBlock.innerHTML = '<div class="mono" style="padding:16px;color:#5c6b7f">暂无对话</div>';
      }
      grid.appendChild(normalBlock);

      // 系统/测试频道 — 可折叠
      if (system.length > 0) {
        const sysWrap = document.createElement('div');
        sysWrap.style.cssText = 'margin-top:4px';

        const sysHead = document.createElement('div');
        sysHead.className = 'ch-section-head';
        sysHead.innerHTML = `<span style="transition:transform .2s;transform:rotate(${systemChannelsExpanded ? '90' : '0'}deg)">▶</span> 系统 / 测试 <span class="badge" style="font-weight:400">${system.length}</span>`;
        sysHead.onclick = () => { systemChannelsExpanded = !systemChannelsExpanded; renderChannels(); };
        sysWrap.appendChild(sysHead);

        if (systemChannelsExpanded) {
          const sysBlock = document.createElement('div');
          sysBlock.style.cssText = 'border:1px solid #1c2834;border-radius:10px;background:#0e1621;overflow:hidden;opacity:.7';
          for (const entry of system) {
            renderChannelRow(entry, sysBlock);
          }
          sysWrap.appendChild(sysBlock);
        }
        grid.appendChild(sysWrap);
      }

      grid.scrollTop = prevScroll;
    }

    async function pollSnapshot(){
      try{
        const r=await fetch('/snapshot',{cache:'no-store'});
        if(!r.ok) return;
        const j=await r.json();
        if(Array.isArray(j.items)){
          const now=Date.now();
          for(const e of j.items){
            upsert(e, true);
          }
          
          // Handle server-side stats if available
          if (j.stats) {
            let changed = false;
            for (const [agentId, sessions] of Object.entries(j.stats)) {
              for (const [sid, stat] of Object.entries(sessions || {})) {
                const key = makeKey(agentId, sid);
                const s = state.get(key);
                if (s) {
                  state.set(key, { ...s, serverTotalTokens: stat, totalTokens: stat });
                  changed = true;
                }
              }
            }
            if (changed) render();
          }
          
          if (j.activeByAgent) {
            const activeSet = new Set();
            for (const [agentId, sessions] of Object.entries(j.activeByAgent)) {
              for (const sid of sessions || []) {
                activeSet.add(makeKey(agentId, sid));
              }
            }
            let pruned = false;
            for (const key of [...state.keys()]) {
              if (!activeSet.has(key)) {
                state.delete(key);
                archived.delete(key);
                expandedSessions.delete(key);
                pruned = true;
              }
            }
            if (pruned) {
              saveArchived();
              render();
            }
          }
        }
      }catch{}
    }
    window.addEventListener('DOMContentLoaded',()=>{
      // 立即拉取一次快照，保证首次加载有数据
      pollSnapshot();
      setInterval(pollSnapshot, 15000);
      // 频道数据 + 备注轮询
      pollChannels();
      setInterval(pollChannels, 5000);
      loadNicknames();
      refreshDeletedList(true).then(() => render());
      setInterval(() => refreshDeletedList(false).then(() => render()), 5000);
      // 同时尝试建立 SSE（若不可用则忽略，由快照兜底）
      const es=new EventSource('/events');
      es.onmessage=(ev)=>{try{const e=JSON.parse(ev.data);if(e.type==='llm-capture'){handleLlmCaptureEvent(e)}else if(e.type==='bridge-event'){/* handled by /bridge.html */}else if(e.type==='topology-edge'){if(topologyViewActive){clearTimeout(topoEdgeDebounce);topoEdgeDebounce=setTimeout(pollTopology,2000)}}else{upsert(e, false)}}catch{}};
      es.onerror=()=>{};

      window.addEventListener('resize', ()=>{if(topologyViewActive){resizeTopoCanvas();}render();});
    });
  </script>
</head>
<body>
  <header>
    <div class="header-row">
          <h1>Agent → Session 实时监控</h1>
      <div class="row">
        <a href="/heartbeat.html" class="toggle-archived" style="text-decoration:none">Heartbeat Scheduler</a>
        <button class="toggle-archived" onclick="location.href='/activity'">详细时间轴 (Activity)</button>
        <button id="btn-channel-view" class="toggle-archived" onclick="toggleChannelView()">频道视图</button>
        <button id="btn-topology-view" class="toggle-archived" onclick="toggleTopologyView()" style="border-color:#9c27b0;color:#e1bee7">拓扑视图</button>
        <button class="toggle-archived" onclick="openAutoDeleteSettings()">自动软删设置</button>
        <button class="toggle-archived" onclick="toggleLlmCapturesPanel()" style="border-color:#5e2a86;color:#e1bee7">LLM Requests</button>
        <a href="/bridge.html" class="toggle-archived" style="border-color:#2e7d32;color:#a5d6a7;text-decoration:none">Bridge</a>
        <button id="btn-toggle-deleted" class="toggle-archived" onclick="toggleDeletedPanel()">已删除</button>
        <button id="btn-toggle-archived" class="toggle-archived" onclick="toggleShowArchived()">显示归档</button>
      </div>
    </div>
  </header>
  <div id="settings-overlay" class="overlay" onclick="if(event.target===this)closeAutoDeleteSettings()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-body" id="settings-box"></div>
    </div>
  </div>
  <div id="deleted-overlay" class="overlay" onclick="if(event.target===this)toggleDeletedPanel()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-head">
        <div class="row" style="gap:10px">
          <div class="badge">已删除</div>
          <div class="mono">软删：可随时恢复</div>
        </div>
        <div class="row">
          <button class="toggle-archived" onclick="refreshDeletedList(true).then(() => renderDeletedPanel())">刷新</button>
          <button class="toggle-archived" onclick="toggleDeletedPanel()">关闭</button>
        </div>
      </div>
      <div id="deleted-list" class="panel-body"></div>
    </div>
  </div>
  <div id="llm-captures-overlay" class="overlay" onclick="if(event.target===this)toggleLlmCapturesPanel()" style="display:none">
    <div class="panel" style="width:min(1200px,95%);max-height:90vh;display:flex;flex-direction:column" onclick="event.stopPropagation()">
      <div class="panel-head">
        <div class="row" style="gap:10px">
          <div class="badge" style="border-color:#5e2a86;color:#e1bee7">LLM Requests</div>
          <div class="mono">mitmproxy 捕获的完整 API 请求/响应</div>
        </div>
        <div class="row" style="gap:6px">
          <button class="toggle-archived" onclick="pollLlmCaptures().then(()=>renderLlmCapturesPanel())">刷新</button>
          <button class="toggle-archived" onclick="toggleLlmCapturesPanel()">关闭</button>
        </div>
      </div>
      <div style="flex:1;min-height:0;display:grid;grid-template-columns:320px 1fr;overflow:hidden">
        <div id="llm-captures-list" style="overflow:auto;border-right:1px solid #1c2834;padding:4px 0"></div>
        <div id="llm-captures-detail" style="overflow:auto;padding:12px">
          <div class="mono">点击左侧列表查看详情</div>
        </div>
      </div>
    </div>
  </div>
  <div id="grid"></div>
</body>
</html>
