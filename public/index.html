<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Monitor</title>
  <link rel="stylesheet" href="/css/monitor.css">
  <script type="module" src="/js/bootstrap.js"></script>
</head>
<body>
  <header>
    <div class="header-row">
          <h1>Agent → Session 实时监控</h1>
      <div class="row">
        <a href="/heartbeat.html" class="toggle-archived" style="text-decoration:none">Heartbeat Scheduler</a>
        <button class="toggle-archived" onclick="location.href='/activity'">详细时间轴 (Activity)</button>
        <button id="btn-channel-view" class="toggle-archived" onclick="toggleChannelView()">频道视图</button>
        <button id="btn-topology-view" class="toggle-archived" onclick="toggleTopologyView()" style="border-color:#9c27b0;color:#e1bee7">拓扑视图</button>
        <button class="toggle-archived" onclick="openAutoDeleteSettings()">自动软删设置</button>
        <button class="toggle-archived" onclick="toggleLlmCapturesPanel()" style="border-color:#5e2a86;color:#e1bee7">LLM Requests</button>
        <a href="/bridge.html" class="toggle-archived" style="border-color:#2e7d32;color:#a5d6a7;text-decoration:none">Bridge</a>
        <button id="btn-toggle-deleted" class="toggle-archived" onclick="toggleDeletedPanel()">已删除</button>
        <button id="btn-toggle-archived" class="toggle-archived" onclick="toggleShowArchived()">显示归档</button>
      </div>
    </div>
  </header>
  <div id="settings-overlay" class="overlay" onclick="if(event.target===this)closeAutoDeleteSettings()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-body" id="settings-box"></div>
    </div>
  </div>
  <div id="deleted-overlay" class="overlay" onclick="if(event.target===this)toggleDeletedPanel()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-head">
        <div class="row" style="gap:10px">
          <div class="badge">已删除</div>
          <div class="mono">软删：可随时恢复</div>
        </div>
        <div class="row">
          <button class="toggle-archived" onclick="refreshDeletedList(true).then(() => renderDeletedPanel())">刷新</button>
          <button class="toggle-archived" onclick="toggleDeletedPanel()">关闭</button>
        </div>
      </div>
      <div id="deleted-list" class="panel-body"></div>
    </div>
  </div>
  <div id="llm-captures-overlay" class="overlay" onclick="if(event.target===this)toggleLlmCapturesPanel()" style="display:none">
    <div class="panel" style="width:min(1200px,95%);max-height:90vh;display:flex;flex-direction:column" onclick="event.stopPropagation()">
      <div class="panel-head">
        <div class="row" style="gap:10px">
          <div class="badge" style="border-color:#5e2a86;color:#e1bee7">LLM Requests</div>
          <div class="mono">mitmproxy 捕获的完整 API 请求/响应</div>
        </div>
        <div class="row" style="gap:6px">
          <button class="toggle-archived" onclick="pollLlmCaptures().then(()=>renderLlmCapturesPanel())">刷新</button>
          <button class="toggle-archived" onclick="toggleLlmCapturesPanel()">关闭</button>
        </div>
      </div>
      <div style="flex:1;min-height:0;display:grid;grid-template-columns:320px 1fr;overflow:hidden">
        <div id="llm-captures-list" style="overflow:auto;border-right:1px solid #1c2834;padding:4px 0"></div>
        <div id="llm-captures-detail" style="overflow:auto;padding:12px">
          <div class="mono">点击左侧列表查看详情</div>
        </div>
      </div>
    </div>
  </div>
  <div id="grid"></div>
</body>
</html>
